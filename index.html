es: what layer of service you rent, and who it's shared with."},{"t":"sub","text":"Service models"},{"t":"table","head":["Model","You manage","Example"],"rows":[["IaaS","OS and up (rent the infrastructure)","Virtual servers"],["PaaS","Your app (rent a platform)","App hosting/dev platform"],["SaaS","Nothing but use it (rent software)","Email, Office 365, Google Workspace"]]},{"t":"note","text":"The ladder of responsibility: IaaS gives you the most control and the most to manage; SaaS gives you the least of both — you just use it. PaaS is the middle, where you focus on your app and let the provider handle the platform beneath. More convenience trades away control."},{"t":"sub","text":"Deployment models"},{"t":"list","items":[{"l":"Public","s":["Shared provider infrastructure (AWS, Azure)"]},{"l":"Private","s":["Dedicated to one organization"]},{"l":"Hybrid","s":["Mix of public and private"]},{"l":"Community","s":["Shared by related organizations"]}]},{"t":"sub","text":"Cloud characteristics"},{"t":"list","items":["On-demand self-service","Rapid elasticity (scale up/down fast)","Measured/metered usage (pay for what you use)","Resource pooling","Broad network access"]},{"t":"tip","k":"focus","text":"SaaS = software (you just use it). PaaS = platform (you build on it). IaaS = infrastructure (you manage the OS up)."}]}],"takeaways":["A hypervisor runs VMs; Type 1 is bare-metal, Type 2 is hosted on an OS","Virtualization consolidates servers, isolates risk, and enables snapshots/rollback","Needs CPU virtualization (VT-x/AMD-V) plus enough RAM/CPU/storage","Service models: IaaS (manage OS up) → PaaS (build apps) → SaaS (just use)","Deployment: public, private, hybrid, community; cloud = elastic, metered, on-demand"],"cards":[{"q":"What is a hypervisor?","a":"Software that creates and manages virtual machines on a physical host."},{"q":"Type 1 vs Type 2 hypervisor?","a":"Type 1 runs directly on hardware (bare-metal, data centers); Type 2 runs on top of a host OS (desktops)."},{"q":"Give an example of a Type 1 hypervisor.","a":"VMware ESXi or Microsoft Hyper-V (bare-metal)."},{"q":"Give an example of a Type 2 hypervisor.","a":"Oracle VirtualBox or VMware Workstation (hosted on an OS)."},{"q":"Why does Type 1 generally outperform Type 2?","a":"It sits directly on hardware with no host OS in between, reducing overhead."},{"q":"Name three benefits of virtualization.","a":"Server consolidation (less hardware), safe isolation/sandboxing, and easy testing with instant snapshot rollback."},{"q":"What is a VM snapshot useful for?","a":"Capturing a known-good state so you can instantly roll back after a risky change or failure."},{"q":"What CPU feature is required for virtualization?","a":"Hardware virtualization support — Intel VT-x or AMD-V (enabled in BIOS/UEFI)."},{"q":"What does IaaS provide?","a":"Infrastructure (virtual machines/storage/networking); you manage the OS and everything above it."},{"q":"What does PaaS provide?","a":"A platform to build and run your application; the provider manages the underlying OS/infrastructure."},{"q":"What does SaaS provide?","a":"Ready-to-use software over the internet (e.g., email, Office 365); you manage nothing but your data/use."},{"q":"Which cloud model gives you the most control and most to manage?","a":"IaaS."},{"q":"Which cloud model requires the least management from you?","a":"SaaS — you just use the software."},{"q":"Office 365 / Google Workspace are which service model?","a":"SaaS."},{"q":"Public vs private cloud?","a":"Public uses shared provider infrastructure (AWS/Azure); private is dedicated to a single organization."},{"q":"What is a hybrid cloud?","a":"A mix of public and private cloud, letting workloads move between them."},{"q":"What is a community cloud?","a":"Cloud infrastructure shared by several related organizations with common needs."},{"q":"What does 'rapid elasticity' mean?","a":"Resources can scale up or down quickly to match demand."},{"q":"What does 'measured/metered service' mean?","a":"Usage is tracked and you pay only for what you consume."},{"q":"How does the cloud relate to virtualization?","a":"The cloud is virtualization at massive scale, rented on demand over the internet."},{"q":"What does 'resource pooling' mean in cloud computing?","a":"The provider serves many customers from a shared pool of physical resources, allocated dynamically."}]},{"id":9,"core":1,"title":"Supporting Mobile Devices","short":"Mobile Devices","blurb":"Mobile hardware and connectivity, account/data sync, laptop component replacement, and mobile troubleshooting — and why mobile's sealed, battery-powered, always-connected nature changes how you support it.","sections":[{"h":"9.1 Mobile Hardware & Connectivity","blocks":[{"t":"p","text":"Mobile devices pack a full computer into a sealed, battery-powered shell. That design — integrated parts, limited repairability, constant wireless connectivity — shapes every support decision you make."},{"t":"sub","text":"Connectivity"},{"t":"list","items":[{"l":"Cellular","s":["3G/4G LTE/5G mobile data"]},{"l":"Wi-Fi","s":["Local wireless networking"]},{"l":"Bluetooth","s":["Short-range peripherals (pairing)"]},{"l":"NFC","s":["Very short range — tap to pay/share"]},{"l":"Hotspot/tethering","s":["Share the phone's cellular data with other devices"]},{"l":"Airplane mode","s":["Disables all radios at once"]}]},{"t":"note","text":"Why this matters: each radio is a different range/purpose — NFC for a tap, Bluetooth for a few meters, Wi-Fi for a building, cellular for everywhere. Troubleshooting connectivity starts by asking which radio the task needs and whether it's enabled (airplane mode is the classic 'question the obvious')."},{"t":"sub","text":"Ports & accessories"},{"t":"list","items":["USB-C (most Android, newer iPhones)","Lightning (older iPhones)","Wireless charging (Qi)","Docking stations turn a laptop into a desktop"]}]},{"h":"9.2 Accounts, Apps & Data Sync","blocks":[{"t":"p","text":"A modern phone is tied to an account (Apple ID / Google account) that syncs data to the cloud. This is why a lost phone doesn't mean lost contacts — and why account security is paramount."},{"t":"list","items":["Sync targets: contacts, calendar, email, photos, app data","Cloud backup enables restore to a new device","Corporate email/data often managed by MDM","2FA protects the account behind everything"]},{"t":"note","text":"The big-picture risk: because one account unlocks mail, photos, payments, and backups, compromising it is catastrophic. That's why MDM, strong authentication, and remote wipe exist — the account is the crown jewel, not the hardware."},{"t":"sub","text":"MDM (Mobile Device Management)"},{"t":"list","items":["Enforces policies (passcode, encryption)","Pushes apps/configs","Enables remote lock/wipe of lost devices","Separates work and personal data"]}]},{"h":"9.3 Laptop Hardware & Troubleshooting","blocks":[{"t":"sub","text":"Field-replaceable parts"},{"t":"list","items":["RAM (SO-DIMM), storage (M.2/2.5\")","Battery (sometimes internal)","Keyboard, display assembly, Wi-Fi card","Thermal cleaning/repaste"]},{"t":"sub","text":"Common mobile issues"},{"t":"table","head":["Symptom","Likely cause"],"rows":[["Won't charge","Cable, port debris, charger, battery"],["Overheating","Heavy app, blocked vents, battery"],["Short battery life","Background apps, screen brightness, aging battery"],["No connectivity","Airplane mode, Wi-Fi/Bluetooth off, weak signal"],["Swollen battery","Stop using — safety hazard, replace"],["Unresponsive touch","Restart, screen protector, or digitizer fault"]]},{"t":"tip","k":"focus","text":"A swollen battery is a safety hazard — power down, don't puncture, and replace it. This is a guaranteed exam-safety point."},{"t":"note","text":"How mobile troubleshooting differs: you can't just swap parts freely, so software fixes (restart, update, toggle radios, check settings) come first, and a soft/forced restart resolves a surprising share of issues before any hardware suspicion."}]}],"takeaways":["Match the radio to the task: NFC (tap) < Bluetooth (meters) < Wi-Fi (building) < cellular (everywhere)","Airplane mode disables all radios — the classic connectivity 'question the obvious'","The account (Apple ID/Google) is the crown jewel; protect it with 2FA and MDM","MDM enforces policy and enables remote lock/wipe of lost devices","A swollen battery is a safety hazard — power off and replace; never puncture"],"cards":[{"q":"Order by range: Wi-Fi, NFC, Bluetooth, cellular.","a":"NFC (tap) < Bluetooth (meters) < Wi-Fi (building) < cellular (everywhere)."},{"q":"What does airplane mode do?","a":"Disables all wireless radios (cellular, Wi-Fi, Bluetooth) at once."},{"q":"What is NFC used for?","a":"Very short-range tap interactions like mobile payments and quick pairing/sharing."},{"q":"What is tethering/hotspot?","a":"Sharing a phone's cellular data connection with other devices over Wi-Fi/USB/Bluetooth."},{"q":"A phone can't connect to anything. First obvious check?","a":"Whether airplane mode is on (or the needed radio is toggled off)."},{"q":"What connector do most newer phones use?","a":"USB-C (older iPhones use Lightning)."},{"q":"What standard enables wireless charging?","a":"Qi."},{"q":"Why doesn't losing a phone usually lose your contacts/photos?","a":"They're synced to the cloud via your Apple ID / Google account, restorable to a new device."},{"q":"Why is the mobile account the 'crown jewel'?","a":"It unlocks mail, photos, payments, and backups — compromising it is catastrophic, so it needs 2FA/MDM protection."},{"q":"What does MDM stand for and do?","a":"Mobile Device Management — enforces policies, pushes apps/configs, and enables remote lock/wipe."},{"q":"How does MDM handle a lost corporate phone?","a":"It can remotely lock and/or wipe the device to protect company data."},{"q":"Why does MDM separate work and personal data?","a":"So the company can manage/wipe its data without touching the user's personal content."},{"q":"Name three field-replaceable laptop parts.","a":"RAM (SO-DIMM), storage (M.2/2.5\"), and battery (also Wi-Fi card, keyboard, display)."},{"q":"A laptop won't charge. What do you check?","a":"The cable/charger, port for debris, and the battery — verify each link in the power path."},{"q":"Causes of short mobile battery life?","a":"Background apps, high screen brightness, weak-signal radio hunting, and an aging battery."},{"q":"What should you do with a swollen battery?","a":"Power down, stop using it, don't puncture it, and replace it — it's a safety hazard."},{"q":"A phone overheats. Likely causes?","a":"A heavy/runaway app, blocked vents (in laptops), charging, or a failing battery."},{"q":"Touchscreen is unresponsive. First steps?","a":"Restart the device, remove a bad screen protector, and check for a digitizer fault if it persists."},{"q":"Why try software fixes before hardware on mobile?","a":"Parts aren't easily swapped; restarts, updates, and toggling settings resolve many issues first."},{"q":"What does a docking station do for a laptop?","a":"Turns it into a desktop — one connection adds monitors, peripherals, power, and network."},{"q":"Why is 2FA especially important on mobile accounts?","a":"The account controls everything synced; a second factor blocks takeover even if the password leaks."}]},{"id":10,"core":1,"title":"Supporting Print Devices","short":"Print Devices","blurb":"Printer setup, the laser imaging process you'll be tested on every time, maintenance by printer type, and quality troubleshooting — plus why each technology fits a different job.","sections":[{"h":"10.1 Printer Types & How They Work","blocks":[{"t":"p","text":"Different print technologies exist because they optimize for different needs — speed and volume, photo quality, or rugged multipart forms. Knowing the mechanism tells you what goes wrong and how to fix it."},{"t":"table","head":["Type","How it works","Best for"],"rows":[["Laser","Toner fused by heat (electrophotographic)","High-volume office printing"],["Inkjet","Liquid ink sprayed onto paper","Photos, low-volume color"],["Thermal","Heat on special paper","Receipts, labels"],["Impact (dot-matrix)","Pins strike a ribbon","Multipart carbon forms"],["3D","Builds objects layer by layer","Prototypes/parts"]]},{"t":"sub","text":"The laser imaging process (memorize in order)"},{"t":"steps","items":["Processing — build the page image","Charging — apply uniform charge to the drum","Exposing — laser writes the image (discharges areas)","Developing — toner sticks to the image","Transferring — toner moves to the paper","Fusing — heat/pressure bonds toner permanently","Cleaning — drum wiped for the next page"]},{"t":"note","text":"Why this sequence matters: nearly every laser print-quality fault maps to one step. Toner that rubs off = fusing problem. Repeated ghost images = drum/cleaning. Faint print = low toner or charging. The seven steps are a diagnostic map, not just trivia."},{"t":"tip","k":"focus","text":"Memorize: Processing, Charging, Exposing, Developing, Transferring, Fusing, Cleaning. A common mnemonic is 'Please Come Eat Donuts, Try Five Cups.'"}]},{"h":"10.2 Setup, Sharing & Maintenance","blocks":[{"t":"list","items":["Install the correct driver (PCL or PostScript)","Connect via USB, network (IP), or wireless","Share locally or via a print server","Configure duplex, color, and security/PIN printing"]},{"t":"sub","text":"Maintenance by type"},{"t":"list","items":[{"l":"Laser","s":["Replace toner","Use a maintenance kit (fuser, rollers)","Vacuum toner with an ESD-safe/HEPA vac — never standard"]},{"l":"Inkjet","s":["Replace cartridges","Clean/align print heads","Run nozzle checks"]},{"l":"Thermal","s":["Replace paper","Clean the heating element"]},{"l":"Impact","s":["Replace ribbon","Replace print head"]}]},{"t":"note","text":"Safety connection: spilled toner is fine plastic powder — a regular vacuum blows it into the air and its motor can ignite it. Use a toner-rated/HEPA vacuum and cold water (hot water sets toner) if it gets on skin/clothes."}]},{"h":"10.3 Troubleshooting Print Quality","blocks":[{"t":"table","head":["Symptom","Likely cause"],"rows":[["Faint/light print","Low toner/ink or charging issue"],["Toner smears/rubs off","Fuser not bonding (fusing step)"],["Ghost images repeating","Drum/cleaning issue or bad eraser lamp"],["Vertical lines/streaks","Scratched drum or dirty rollers"],["Paper jams","Worn rollers, wrong paper, humidity"],["Garbled output","Wrong/corrupt driver"],["Blank pages","Empty toner, transfer corona failure"]]},{"t":"tip","k":"tip","text":"Garbled text = driver problem. Physical defects (lines, ghosts, smears) = a hardware step in the imaging process."},{"t":"note","text":"The unifying logic: map the symptom to a stage. Output that prints but looks wrong points to imaging/hardware; output that's wrong before it prints (garbled, won't print) points to driver/spooler/connection."}]}],"takeaways":["Laser imaging order: Processing, Charging, Exposing, Developing, Transferring, Fusing, Cleaning","Most laser quality faults map to one imaging step (smear=fuser, ghost=drum/cleaning)","Match technology to job: laser=volume, inkjet=photos, thermal=receipts, impact=multipart","Clean toner only with an ESD-safe/HEPA vacuum; use cold water on spills","Garbled output = driver issue; physical defects = imaging hardware"],"cards":[{"q":"List the seven steps of the laser imaging process in order.","a":"Processing, Charging, Exposing, Developing, Transferring, Fusing, Cleaning."},{"q":"What does the fusing step do?","a":"Uses heat and pressure to bond the toner permanently to the paper."},{"q":"Toner rubs off the printed page. Which step failed?","a":"Fusing — the fuser isn't bonding the toner."},{"q":"What does the charging step do?","a":"Applies a uniform electrical charge to the drum before the laser writes the image."},{"q":"What does the exposing step do?","a":"The laser writes the page image by discharging specific areas of the drum."},{"q":"Repeating ghost images down the page. Likely cause?","a":"A drum/cleaning issue (or failing eraser lamp) leaving residual image."},{"q":"Which printer type is best for high-volume office printing?","a":"Laser."},{"q":"Which printer type suits multipart carbon forms?","a":"Impact (dot-matrix) — pins strike through to copies."},{"q":"Which printer type is used for receipts and labels?","a":"Thermal — heat on special paper."},{"q":"Why use an inkjet for photos?","a":"Liquid ink blends colors smoothly for photo-quality output."},{"q":"Two common printer page-description drivers?","a":"PCL and PostScript."},{"q":"How can a printer be shared with many users?","a":"Via a network IP connection or a print server."},{"q":"Why must you use a HEPA/toner-rated vacuum for toner spills?","a":"Fine toner powder can pass through and ignite in a standard vacuum and become airborne."},{"q":"What water temperature for toner on skin/clothes, and why?","a":"Cold — hot water sets/fuses the toner into the material."},{"q":"Inkjet output has missing colors or banding. Fix?","a":"Clean/align the print heads and run a nozzle check; replace a depleted cartridge."},{"q":"What's in a laser maintenance kit?","a":"Wear parts like the fuser and rollers, replaced periodically to prevent jams/quality issues."},{"q":"Garbled or gibberish output. Most likely cause?","a":"A wrong or corrupt printer driver."},{"q":"Vertical lines or streaks on laser output. Cause?","a":"A scratched drum or dirty/contaminated rollers."},{"q":"Frequent paper jams. Common causes?","a":"Worn pickup rollers, wrong/damp paper, or humidity."},{"q":"Why is the imaging sequence a 'diagnostic map'?","a":"Most quality faults trace to one specific step, so the symptom points to the failed stage."},{"q":"Blank pages coming out of a laser printer. Causes?","a":"Empty toner cartridge or a failed transfer corona/roller not moving toner to paper."}]},{"id":11,"core":2,"title":"Managing Support Procedures","short":"Support Procedures","blurb":"The administrative backbone of IT support — SOPs, SLAs, ticketing, professional communication, and OS types. The unglamorous structure that makes support consistent, accountable, and fast.","sections":[{"h":"11.1 Documentation & Process","blocks":[{"t":"p","text":"Support scales only when knowledge and process are written down. Documentation turns one expert's fix into something the whole team (and future hires) can repeat — and creates the accountability trail organizations depend on."},{"t":"list","items":[{"l":"SOP","s":["Standard Operating Procedure — the agreed steps for a task"]},{"l":"Knowledge base","s":["Searchable solutions/articles"]},{"l":"Ticketing system","s":["Tracks issues from report to resolution"]},{"l":"Asset/inventory","s":["What hardware/software exists and where"]},{"l":"Network/topology diagrams","s":["How things connect"]},{"l":"AUP","s":["Acceptable Use Policy — how users may use systems"]}]},{"t":"note","text":"How this connects: a ticket captures the troubleshooting record (step 6 of the methodology) in a system everyone can see; the knowledge base turns resolved tickets into reusable answers. Together they shrink time-to-resolution and prevent the same problem being solved from scratch repeatedly."},{"t":"sub","text":"A good ticket contains"},{"t":"list","items":["User and device info","Clear problem description","Categorization and priority","Steps taken and resolution","Time tracking"]}]},{"h":"11.2 SLAs & Professional Communication","blocks":[{"t":"list","items":[{"l":"SLA","s":["Service Level Agreement","Defines response/resolution targets and scope"]},{"l":"Escalation","s":["Tiered support (T1→T2→T3)","Move up when scope/skill is exceeded"]}]},{"t":"note","text":"Why SLAs exist: they set shared expectations so 'fast' isn't subjective. They drive prioritization (a down server outranks a cosmetic issue) and define when something must be escalated to meet its deadline."},{"t":"sub","text":"Communication essentials (re-tested from Module 1)"},{"t":"list","items":["Plain language, no unexplained jargon","Set expectations and follow up","Stay calm and respectful with difficult users","Protect confidential information","Document the interaction"]}]},{"h":"11.3 Types of Operating Systems","blocks":[{"t":"table","head":["OS","Use"],"rows":[["Windows","Most common business desktop"],["macOS","Apple computers; creative/dev use"],["Linux","Servers, dev, appliances; open source"],["Chrome OS","Web-centric, lightweight (education)"],["iOS / iPadOS","Apple mobile (closed ecosystem)"],["Android","Open mobile OS, many vendors"]]},{"t":"note","text":"The big picture: each OS reflects a philosophy — Windows for broad compatibility, macOS/iOS for tight integration in a closed ecosystem, Linux/Android for openness and customization. Support choices (software, management, security) flow from those differences."},{"t":"list","items":["Vendor-specific vs open source","32-bit vs 64-bit (64-bit addresses far more RAM)","Workstation vs server vs mobile editions","Compatibility and support lifecycle/end-of-life"]}]}],"takeaways":["Documentation/ticketing turn one fix into repeatable team knowledge and accountability","A good ticket records the problem, steps, resolution, priority, and time","An SLA defines response/resolution targets and drives prioritization/escalation","Escalate through tiers (T1→T2→T3) when scope or skill is exceeded","Each OS reflects a philosophy (compatibility vs integration vs openness) that shapes support"],"cards":[{"q":"What is an SOP?","a":"A Standard Operating Procedure — the agreed, documented steps for performing a task consistently."},{"q":"What is a knowledge base?","a":"A searchable collection of solution articles built from resolved issues, speeding future fixes."},{"q":"What does a ticketing system do?","a":"Tracks an issue from initial report through resolution, with history and accountability."},{"q":"What belongs in a good support ticket?","a":"User/device info, clear problem description, category/priority, steps taken, resolution, and time tracking."},{"q":"What is an AUP?","a":"Acceptable Use Policy — defines how users are permitted to use organizational systems."},{"q":"What is an SLA?","a":"Service Level Agreement — defines response/resolution time targets and the scope of support."},{"q":"How does an SLA drive prioritization?","a":"It sets shared expectations so critical issues (e.g., a down server) outrank minor ones and meet deadlines."},{"q":"What is tiered escalation (T1/T2/T3)?","a":"Support levels of increasing expertise; issues move up when they exceed the current tier's scope/skill."},{"q":"Why does documentation let support scale?","a":"It converts one person's fix into repeatable team knowledge, so problems aren't re-solved from scratch."},{"q":"How does a ticket relate to the troubleshooting methodology?","a":"It captures step 6 (documentation) in a shared system — problem, actions, and outcome."},{"q":"What is asset/inventory management?","a":"Tracking what hardware/software exists, its configuration, and its location."},{"q":"What does a network topology diagram show?","a":"How devices and segments connect — useful for planning and troubleshooting."},{"q":"Which OS dominates business desktops?","a":"Microsoft Windows."},{"q":"What is Linux typically used for?","a":"Servers, development, and appliances — it's open source and highly customizable."},{"q":"What is Chrome OS optimized for?","a":"Lightweight, web-centric use (common in education)."},{"q":"32-bit vs 64-bit OS — key practical difference?","a":"64-bit addresses far more RAM (beyond ~4 GB) and runs 64-bit software."},{"q":"iOS vs Android philosophy?","a":"iOS is a closed, tightly integrated Apple ecosystem; Android is open and used by many vendors."},{"q":"Why does OS choice affect support decisions?","a":"Compatibility, management tools, and security models differ, shaping software and policy choices."},{"q":"What is an end-of-life (EOL) OS risk?","a":"No more security updates, leaving it vulnerable — plan upgrades before EOL."},{"q":"Why protect confidential information during support?","a":"It maintains user trust and legal/ethical compliance; mishandling can cause real harm."},{"q":"Why set expectations and follow up with users?","a":"It keeps them cooperative and informed, and is part of meeting SLA commitments."}]},{"id":12,"core":2,"title":"Configuring Windows","short":"Configuring Windows","blurb":"User-facing settings, the system-level configuration that's heavily tested, installing applications, and cloud apps — and how the Settings app and Control Panel map to what users actually need.","sections":[{"h":"12.1 User & System Settings","blocks":[{"t":"p","text":"Windows exposes configuration through Settings (modern) and Control Panel (legacy). The exam expects you to know where common tasks live and what each applet controls."},{"t":"table","head":["Tool / applet","Controls"],"rows":[["Settings app","Modern config hub"],["Control Panel","Legacy applets"],["Display","Resolution, scaling, multiple monitors"],["Network & Internet","Adapters, Wi-Fi, proxy"],["Devices/Device Manager","Hardware and drivers"],["Power Options","Sleep, hibernate, plans"],["User Accounts","Account types, UAC"],["Programs & Features","Uninstall/repair apps, Windows features"]]},{"t":"note","text":"Why two interfaces coexist: Microsoft is migrating from Control Panel to Settings, but not everything has moved. Knowing both — and that some advanced applets still only live in Control Panel — is exactly what the exam checks."},{"t":"sub","text":"Key system tools"},{"t":"list","items":[{"l":"System (sysdm.cpl)","s":["Computer name, domain, performance, remote"]},{"l":"msconfig","s":["Boot options, startup (System Configuration)"]},{"l":"Device Manager","s":["Driver issues, disabled/unknown devices"]},{"l":"Disk Management","s":["Partitions, format, drive letters, volumes"]}]}]},{"h":"12.2 Installing & Managing Applications","blocks":[{"t":"list","items":["Check system requirements (CPU, RAM, disk, OS edition)","32-bit vs 64-bit compatibility","Local install vs Microsoft Store vs cloud/web app","Permissions: many installs need admin rights","Digital signing/trusted source to avoid malware"]},{"t":"note","text":"How this connects to security: where an app comes from is a security decision. A signed app from the Store or vendor is far safer than a random downloaded installer. 'Check the source' is both a setup step and a malware-prevention habit."},{"t":"sub","text":"Cloud-based applications"},{"t":"list","items":["Run in the browser or as light clients (SaaS)","Data lives in the cloud, synced across devices","Need reliable internet; reduce local install/maintenance","Examples: Microsoft 365, Google Workspace"]}]}],"takeaways":["Windows config splits between the modern Settings app and legacy Control Panel","Know key tools: msconfig (boot/startup), Device Manager (drivers), Disk Management (volumes), System applet","Before installing, verify requirements, 32/64-bit fit, permissions, and a trusted source","Install source is a security decision — prefer signed Store/vendor apps","Cloud apps keep data synced in the cloud and reduce local maintenance but need internet"],"cards":[{"q":"What are the two main Windows configuration interfaces?","a":"The modern Settings app and the legacy Control Panel."},{"q":"Why do both Settings and Control Panel still exist?","a":"Microsoft is migrating to Settings, but some advanced applets remain only in Control Panel."},{"q":"Where do you change screen resolution and multi-monitor layout?","a":"Settings → Display (Display applet)."},{"q":"What does Device Manager handle?","a":"Hardware devices and drivers — updating, disabling, and spotting unknown/failed devices."},{"q":"What does Disk Management do?","a":"Creates/formats partitions and volumes, assigns drive letters, and extends/shrinks disks."},{"q":"What does msconfig (System Configuration) control?","a":"Boot options and startup settings used in troubleshooting."},{"q":"Where do you uninstall or repair a desktop application?","a":"Programs & Features (or Settings → Apps)."},{"q":"What does the System applet (sysdm.cpl) configure?","a":"Computer name, domain/workgroup, performance options, and remote settings."},{"q":"What should you verify before installing software?","a":"System requirements (CPU/RAM/disk), OS edition, 32/64-bit compatibility, and permissions."},{"q":"Why do many installs require admin rights?","a":"They write to protected system areas; UAC requires elevation to make those changes."},{"q":"Why does install source matter for security?","a":"Signed apps from the Store/vendor are far safer than random installers that may carry malware."},{"q":"What is a digitally signed application?","a":"One verified by a trusted certificate, confirming publisher and that it wasn't tampered with."},{"q":"What defines a cloud/SaaS application?","a":"It runs in the browser/light client with data stored and synced in the cloud."},{"q":"A benefit of cloud apps for IT support?","a":"Less local install/maintenance and automatic updates; data syncs across devices."},{"q":"A drawback of cloud apps?","a":"They depend on reliable internet connectivity to function."},{"q":"Where do you configure power plans (sleep/hibernate)?","a":"Power Options (Settings → Power, or Control Panel → Power Options)."},{"q":"Where do you manage user accounts and account types?","a":"User Accounts (Settings → Accounts), which also ties into UAC."},{"q":"How do you check a misbehaving device's driver status?","a":"Open Device Manager and look for warning icons, then update/roll back the driver."},{"q":"Where do you enable optional Windows features?","a":"Programs & Features → Turn Windows features on or off."},{"q":"What's the practical reason to know both Settings and Control Panel locations?","a":"Tasks are split between them, and the exam (and real support) requires finding each quickly."},{"q":"Examples of major cloud productivity suites?","a":"Microsoft 365 and Google Workspace."}]},{"id":13,"core":2,"title":"Managing Windows","short":"Managing Windows","blurb":"Management consoles, the command-line tools you must recognize on sight, and Windows networking configuration — the admin toolkit for controlling and fixing Windows at depth.","sections":[{"h":"13.1 Management Consoles (MMC snap-ins)","blocks":[{"t":"p","text":"Beneath the friendly Settings app sit powerful admin consoles. These Microsoft Management Console snap-ins are where real configuration and troubleshooting happen, and the exam expects you to match each tool to its job."},{"t":"table","head":["Tool","Purpose"],"rows":[["Task Manager","Processes, performance, startup apps"],["Event Viewer","System/app/security logs"],["Device Manager","Hardware and drivers"],["Disk Management","Partitions and volumes"],["Services (services.msc)","Start/stop background services"],["Task Scheduler","Run tasks on a schedule/trigger"],["Local Users & Groups","Manage accounts/groups"],["Group Policy (gpedit.msc)","Enforce local policies"],["Performance Monitor","Detailed metrics/counters"]]},{"t":"note","text":"Why Event Viewer is a troubleshooter's best friend: when something fails silently, the logs record what, when, and often why. Learning to read the System and Application logs turns 'it just broke' into a specific error to research."}]},{"h":"13.2 Command-Line Tools","blocks":[{"t":"p","text":"The command line is faster, scriptable, and sometimes the only option (recovery). You must recognize what each command does."},{"t":"table","head":["Command","Does"],"rows":[["ipconfig","Show/refresh IP config"],["ping / tracert","Test reachability / path"],["nslookup","Query DNS"],["sfc /scannow","Repair system files"],["chkdsk","Check/repair disk errors"],["dism","Service/repair the Windows image"],["gpupdate / gpresult","Refresh / report Group Policy"],["netstat","Active connections/ports"],["tasklist / taskkill","List / end processes"],["shutdown","Shut down or restart"]]},{"t":"note","text":"How sfc and dism connect: if Windows files are corrupt, 'sfc /scannow' repairs them from a local cache; if that cache itself is damaged, 'dism /online /cleanup-image /restorehealth' repairs the image first. They're a one-two recovery punch."},{"t":"tip","k":"focus","text":"sfc /scannow repairs system files; chkdsk repairs disk errors; dism repairs the Windows image. Know which fixes what."}]},{"h":"13.3 Windows Networking","blocks":[{"t":"list","items":["Configure adapters: DHCP (automatic) or static IP","Set workgroup vs domain membership","Network location/profile: Private vs Public (firewall behavior)","Map network drives to shared folders","Configure proxy and VPN connections"]},{"t":"note","text":"Why network profile matters: 'Public' tightens the firewall and hides the PC (for cafes/airports); 'Private' relaxes it for trusted home/office networks to allow sharing and discovery. Picking the wrong one either blocks sharing or over-exposes the machine."}]}],"takeaways":["MMC snap-ins (Event Viewer, Services, Task Scheduler, Disk Mgmt) are the real admin toolkit","Event Viewer logs turn silent failures into specific, researchable errors","sfc repairs system files, chkdsk repairs disk errors, dism repairs the Windows image","Recognize core CLI tools (ipconfig, ping, gpupdate, sfc, chkdsk) on sight","Network profile Public vs Private changes firewall/sharing behavior"],"cards":[{"q":"What does Task Manager show and control?","a":"Running processes, performance, and startup apps — and lets you end tasks."},{"q":"What is Event Viewer used for?","a":"Reading system, application, and security logs to diagnose failures."},{"q":"What does services.msc let you do?","a":"Start, stop, and configure background Windows services."},{"q":"What is Task Scheduler for?","a":"Running programs/scripts automatically on a schedule or trigger."},{"q":"What does gpedit.msc manage?","a":"Local Group Policy — enforcing configuration and security settings."},{"q":"Where do you create local accounts and groups?","a":"Local Users and Groups (lusrmgr.msc) — or Settings for basic accounts."},{"q":"What does sfc /scannow do?","a":"Scans and repairs corrupted Windows system files from a local cache."},{"q":"What does chkdsk do?","a":"Checks and repairs file-system and disk errors (and bad sectors with /r)."},{"q":"What does DISM /restorehealth do?","a":"Repairs the underlying Windows image, including the cache sfc relies on."},{"q":"sfc found corruption but couldn't fix it. Next step?","a":"Run DISM /online /cleanup-image /restorehealth, then re-run sfc /scannow."},{"q":"What does ipconfig do?","a":"Displays and refreshes the machine's IP configuration (with /all, /release, /renew, /flushdns)."},{"q":"What does netstat show?","a":"Active network connections and listening ports."},{"q":"What do tasklist and taskkill do?","a":"List running processes and terminate a process (by name or PID) from the command line."},{"q":"What does gpupdate do?","a":"Forces a refresh of Group Policy settings on the machine."},{"q":"DHCP vs static IP configuration?","a":"DHCP assigns addressing automatically; static is manually fixed (for servers/printers needing a constant address)."},{"q":"Workgroup vs domain?","a":"Workgroup is a peer-to-peer group with local accounts; a domain centralizes accounts/policy via a server (Active Directory)."},{"q":"Public vs Private network profile — effect?","a":"Public tightens the firewall and hides the PC; Private relaxes it for trusted networks to allow sharing/discovery."},{"q":"How do you connect to a shared folder as a drive?","a":"Map a network drive to the share's UNC path (\\\\server\\share)."},{"q":"Why is Event Viewer called a troubleshooter's best friend?","a":"It records what failed, when, and often why — converting vague problems into specific errors."},{"q":"What does Performance Monitor provide beyond Task Manager?","a":"Detailed, customizable metrics/counters for in-depth performance analysis over time."},{"q":"Which command safely restarts a remote/local machine on a timer?","a":"shutdown (e.g., shutdown /r /t for a timed restart)."}]},{"id":14,"core":2,"title":"Supporting Windows","short":"Supporting Windows","blurb":"Diagnosing Windows networking, remote access tools, performance utilities, and the boot/recovery toolkit — what to reach for when Windows misbehaves, won't perform, or won't start.","sections":[{"h":"14.1 Networking & Remote Access","blocks":[{"t":"p","text":"Half of Windows support is connectivity. The same path-testing logic from networking applies, plus Windows-specific tools and the remote-access methods that let you fix a machine you're not sitting at."},{"t":"sub","text":"Remote access tools"},{"t":"table","head":["Tool","Note"],"rows":[["RDP","Remote Desktop — full GUI control (port 3389)"],["VPN","Encrypted tunnel into a private network"],["SSH","Secure command-line remote access (port 22)"],["Remote Assistance / 3rd-party","Screen-share to help a user"],["MSRA / Quick Assist","Built-in Windows remote help"]]},{"t":"note","text":"Security connection: remote access is powerful and therefore a major attack target. RDP exposed to the internet is a top breach vector, which is why it should sit behind a VPN and use strong authentication. Convenience and risk rise together."}]},{"h":"14.2 Performance & Troubleshooting Tools","blocks":[{"t":"list","items":[{"l":"Task Manager","s":["Quick CPU/RAM/disk/network and startup view"]},{"l":"Resource Monitor","s":["Deeper per-process resource detail"]},{"l":"Performance Monitor","s":["Long-term counters and logging"]},{"l":"Reliability Monitor","s":["Timeline of crashes/changes"]},{"l":"Event Viewer","s":["Error/warning logs"]},{"l":"msconfig / Startup tab","s":["Disable startup bloat"]}]},{"t":"note","text":"A slow PC is a process-of-elimination problem: find the constrained resource first. Task Manager shows whether CPU, memory, disk, or network is pinned — that single observation steers the whole fix (more RAM, kill a runaway process, replace a dying disk)."},{"t":"tip","k":"focus","text":"Diagnose 'slow' by finding the bottleneck resource in Task Manager before changing anything."}]},{"h":"14.3 Boot & Recovery","blocks":[{"t":"p","text":"When Windows won't start, there's a layered recovery toolkit. You escalate from least to most destructive: repair startup, roll back, restore, then reinstall — always protecting data."},{"t":"list","items":[{"l":"WinRE","s":["Windows Recovery Environment — auto-appears after failed boots"]},{"l":"Startup Repair","s":["Fixes boot files automatically"]},{"l":"Safe Mode","s":["Minimal drivers — isolate a bad driver/app"]},{"l":"System Restore","s":["Roll back system state to a restore point"]},{"l":"Last Known Good / rollback","s":["Undo a recent bad change"]},{"l":"Reset this PC","s":["Reinstall Windows, optionally keep files"]},{"l":"bootrec","s":["Rebuild BCD/MBR boot records"]}]},{"t":"note","text":"The escalation ladder: try the least destructive fix that could work. Startup Repair and Safe Mode change nothing permanent; System Restore reverts settings but keeps files; Reset reinstalls Windows. Jumping straight to reinstall risks data and time you didn't need to spend."},{"t":"sub","text":"Common stop/boot issues"},{"t":"list","items":["BSOD → note the stop code, check recent driver/hardware changes","Boot loop → Safe Mode, then roll back the change","'Bootmgr/BCD missing' → bootrec to rebuild","Slow/black boot → disable startup items, update drivers"]}]}],"takeaways":["Remote access (RDP/VPN/SSH) is powerful and a top attack target — protect with VPN + strong auth","Diagnose a slow PC by finding the pinned resource in Task Manager first","Recovery escalates least-to-most destructive: Startup Repair → Safe Mode → System Restore → Reset","Safe Mode isolates bad drivers/apps with minimal drivers loaded","For BSODs, record the stop code and check recent driver/hardware changes"],"cards":[{"q":"What does RDP provide and on what port?","a":"Full remote GUI control of a Windows desktop, over port 3389."},{"q":"Why is exposing RDP directly to the internet risky?","a":"It's a top breach vector; it should sit behind a VPN with strong authentication."},{"q":"What does a VPN do?","a":"Creates an encrypted tunnel into a private network over the public internet."},{"q":"What is Quick Assist / MSRA used for?","a":"Built-in Windows remote help to view/control a user's screen for support."},{"q":"First step to diagnose a slow PC?","a":"Open Task Manager and find which resource (CPU, RAM, disk, network) is pinned."},{"q":"What does Resource Monitor add over Task Manager?","a":"Deeper per-process detail on CPU, disk, network, and memory usage."},{"q":"What does Reliability Monitor show?","a":"A timeline correlating crashes, errors, and system changes."},{"q":"Where do you disable programs that slow boot?","a":"Task Manager's Startup tab (or msconfig)."},{"q":"What is WinRE?","a":"The Windows Recovery Environment, which appears automatically after failed boots to offer repair tools."},{"q":"What does Startup Repair do?","a":"Automatically diagnoses and fixes boot-related file/configuration problems."},{"q":"What is Safe Mode for?","a":"Booting with minimal drivers to isolate a faulty driver, app, or setting."},{"q":"What does System Restore do?","a":"Reverts system files/settings to an earlier restore point without deleting personal files."},{"q":"What does 'Reset this PC' do?","a":"Reinstalls Windows, with an option to keep or remove personal files."},{"q":"Order recovery options least to most destructive.","a":"Startup Repair / Safe Mode → System Restore → Reset this PC → clean reinstall."},{"q":"Why try the least destructive fix first?","a":"To resolve the issue without risking data or wasting time on a full reinstall."},{"q":"A 'Bootmgr is missing / BCD' error appears. Tool to fix it?","a":"bootrec (e.g., /fixmbr, /fixboot, /rebuildbcd) in the recovery environment."},{"q":"What should you record from a BSOD?","a":"The stop code/error name, then check recent driver or hardware changes."},{"q":"A PC boot-loops after a driver update. Approach?","a":"Boot into Safe Mode and roll back the driver or use System Restore."},{"q":"What does SSH provide for Windows/remote admin?","a":"Secure encrypted command-line access (port 22)."},{"q":"Why do convenience and risk rise together with remote access?","a":"The same broad control that helps admins also gives attackers a powerful target if exposed."},{"q":"A user reports general sluggishness after startup. Quick wins?","a":"Disable unneeded startup items, update drivers, and check for a failing disk or low RAM."}]},{"id":15,"core":2,"title":"Securing Windows","short":"Securing Windows","blurb":"Logical security controls, the CIA triad and encryption basics, authentication, Active Directory, and the NTFS-vs-share rule that the exam tests every time.","sections":[{"h":"15.1 Core Security Concepts","blocks":[{"t":"p","text":"Security starts with a model. The CIA triad — Confidentiality, Integrity, Availability — is the lens for every control: does this protect secrecy, prevent tampering, or keep data reachable? Every tool below serves one or more of those goals."},{"t":"list","items":[{"l":"Confidentiality","s":["Only authorized people can read it (encryption, access control)"]},{"l":"Integrity","s":["Data isn't altered (hashing, signatures)"]},{"l":"Availability","s":["Data/services are reachable when needed (redundancy, backups)"]}]},{"t":"sub","text":"Authentication factors"},{"t":"list","items":["Something you know (password/PIN)","Something you have (token/phone)","Something you are (biometric)","MFA combines two or more factors"]},{"t":"note","text":"Why MFA is emphasized: passwords leak constantly, but a second factor the attacker doesn't physically have blocks most account takeovers. It's the single highest-impact control for the effort — which is why it's pushed everywhere."},{"t":"sub","text":"Access control principles"},{"t":"list","items":["Least privilege — only the access needed","Principle of zero trust — verify continually","AAA — Authentication, Authorization, Accounting"]}]},{"h":"15.2 Windows Security Tools","blocks":[{"t":"list","items":[{"l":"User Account Control (UAC)","s":["Prompts for elevation before admin changes"]},{"l":"Windows Defender / Security","s":["Built-in antivirus and firewall"]},{"l":"BitLocker","s":["Full-disk encryption (protects data if device is stolen)"]},{"l":"EFS","s":["Encrypting File System — per-file/folder encryption"]},{"l":"Local Security Policy","s":["Password/lockout/audit policies"]},{"l":"Active Directory","s":["Centralized accounts, groups, and Group Policy"]}]},{"t":"note","text":"BitLocker vs EFS connects to the CIA triad's confidentiality goal at different scopes: BitLocker encrypts the whole drive (great against a stolen laptop), while EFS encrypts specific files (great for protecting select data on a shared machine). Often paired with a TPM chip that safely stores the keys."},{"t":"tip","k":"focus","text":"BitLocker = whole-disk encryption. EFS = individual file/folder encryption. Don't mix them up."}]},{"h":"15.3 NTFS vs Share Permissions","blocks":[{"t":"p","text":"Windows has two permission systems that can both apply to a shared folder, and the exam loves the interaction. NTFS permissions apply locally and over the network; share permissions apply only over the network."},{"t":"list","items":["NTFS permissions: apply always (local + network), fine-grained","Share permissions: apply only over the network, coarse","When both apply, the MOST RESTRICTIVE effective permission wins","Deny always overrides Allow"]},{"t":"note","text":"The rule in plain terms: figure out the user's effective NTFS permission and effective share permission separately, then the actual access is the more restrictive of the two. If NTFS says Read and Share says Full Control, the user gets Read. A single Deny anywhere wins outright."},{"t":"tip","k":"focus","text":"Both NTFS and share apply over the network → the most restrictive wins. Deny beats Allow."}]}],"takeaways":["CIA triad: Confidentiality, Integrity, Availability — the lens for every control","Authentication factors: know / have / are; MFA combines two+ and blocks most takeovers","BitLocker encrypts the whole disk; EFS encrypts individual files/folders","UAC prompts for elevation; least privilege limits access to what's needed","NTFS + share both apply over the network → most restrictive wins; Deny beats Allow"],"cards":[{"q":"What does the CIA triad stand for?","a":"Confidentiality, Integrity, and Availability — the three core security goals."},{"q":"Which CIA goal does encryption primarily serve?","a":"Confidentiality — keeping data readable only to authorized people."},{"q":"Which CIA goal do hashing and signatures serve?","a":"Integrity — proving data hasn't been altered."},{"q":"Name the three authentication factor categories.","a":"Something you know, something you have, and something you are."},{"q":"What is MFA and why is it emphasized?","a":"Multi-factor authentication combines two+ factors; it blocks most account takeovers even when passwords leak."},{"q":"What is the principle of least privilege?","a":"Granting users only the access they need to do their job — nothing more."},{"q":"What does AAA stand for in security?","a":"Authentication, Authorization, and Accounting."},{"q":"What does UAC do?","a":"Prompts for elevation/consent before allowing administrative changes."},{"q":"What is BitLocker?","a":"Windows full-disk encryption that protects data if the device is lost or stolen."},{"q":"What is EFS?","a":"Encrypting File System — encrypts individual files/folders rather than the whole disk."},{"q":"BitLocker vs EFS — key difference?","a":"BitLocker encrypts the entire drive; EFS encrypts selected files/folders."},{"q":"What hardware chip safely stores encryption keys?","a":"The TPM (Trusted Platform Module)."},{"q":"What is Active Directory?","a":"A centralized directory service for managing accounts, groups, and Group Policy across a domain."},{"q":"What does Local Security Policy configure?","a":"Password complexity, account lockout, and audit policies on a local machine."},{"q":"NTFS vs share permissions — where does each apply?","a":"NTFS applies locally and over the network; share applies only over the network."},{"q":"When both NTFS and share permissions apply, which wins?","a":"The most restrictive effective permission of the two."},{"q":"NTFS = Read, Share = Full Control. What does the user get over the network?","a":"Read — the most restrictive of the two."},{"q":"How does a Deny permission behave?","a":"Deny overrides any Allow — it wins outright."},{"q":"Which CIA goal do backups and redundancy support?","a":"Availability — keeping data/services reachable when needed."},{"q":"Why is MFA the highest-impact control for the effort?","a":"It defeats stolen-password attacks with a factor the attacker doesn't physically possess."},{"q":"What is zero trust in one line?","a":"Never implicitly trust; continually verify every user/device before granting access."}]},{"id":16,"core":2,"title":"Installing Operating Systems","short":"Installing OSes","blurb":"Which Windows edition fits which job, the upgrade paths, installation methods, and disk configuration (MBR vs GPT) — the decisions that set up a machine correctly from the first boot.","sections":[{"h":"16.1 Windows Editions & Choosing One","blocks":[{"t":"table","head":["Edition","Fits"],"rows":[["Home","Consumers; no domain join"],["Pro","Business; domain join, BitLocker, RDP host, Group Policy"],["Pro for Workstations","High-end hardware/workloads"],["Enterprise","Large orgs; volume licensing, advanced management"]]},{"t":"note","text":"Why edition matters: the dividing line is usually business features. Domain join, BitLocker, Group Policy, and being an RDP host require Pro or higher. Recommending Home to a business that needs domain membership is a classic wrong answer."},{"t":"tip","k":"focus","text":"Need domain join, BitLocker, Group Policy, or to host Remote Desktop? You need Pro or higher, not Home."}]},{"h":"16.2 Installation Methods & Upgrades","blocks":[{"t":"sub","text":"Install types"},{"t":"list","items":[{"l":"Clean install","s":["Wipes and installs fresh — most reliable"]},{"l":"In-place upgrade","s":["Keeps apps/files, upgrades the OS"]},{"l":"Repair install","s":["Reinstalls Windows over itself to fix corruption"]},{"l":"Image deployment","s":["Push a standard image to many PCs"]},{"l":"Network/PXE","s":["Boot and install over the network"]}]},{"t":"note","text":"Clean vs in-place trade-off: a clean install gives the most stable result but you must back up and reinstall apps; an in-place upgrade is convenient and preserves data but can carry old problems forward. Choose based on whether you're fixing corruption (clean) or just moving versions (in-place)."},{"t":"sub","text":"Boot methods & sources"},{"t":"list","items":["USB / DVD / ISO","Network (PXE)","Internal vs external drive","Recovery partition"]},{"t":"sub","text":"Disk configuration — MBR vs GPT"},{"t":"table","head":["Scheme","Limits","Firmware"],"rows":[["MBR","≤2 TB, 4 primary partitions","Legacy BIOS"],["GPT","Huge disks, many partitions","UEFI"]]},{"t":"note","text":"MBR/GPT pairs with firmware: GPT goes with UEFI and supports drives over 2 TB and Secure Boot; MBR is the legacy BIOS partner. Modern installs use GPT + UEFI. A mismatch (e.g., trying to UEFI-boot an MBR disk) is a common install failure."},{"t":"sub","text":"Filesystems"},{"t":"list","items":["NTFS — Windows default (permissions, encryption, journaling)","exFAT — large files, cross-platform removable media","FAT32 — old/compatible, 4 GB file limit"]}]}],"takeaways":["Business features (domain join, BitLocker, Group Policy, RDP host) need Pro or higher","Clean install = most stable (reinstall apps); in-place upgrade = convenient, keeps data","GPT pairs with UEFI (>2 TB, many partitions, Secure Boot); MBR pairs with legacy BIOS","NTFS is the Windows default; exFAT for large cross-platform media; FAT32 has a 4 GB file limit","Image/PXE deployment standardizes installs across many machines"],"cards":[{"q":"Which Windows edition can join a domain: Home or Pro?","a":"Pro (and higher). Home cannot join a domain."},{"q":"Which features require Pro or higher?","a":"Domain join, BitLocker, Group Policy, and hosting Remote Desktop (RDP)."},{"q":"Which edition suits a large organization with volume licensing?","a":"Enterprise."},{"q":"What is a clean install and its main benefit?","a":"Wiping and installing fresh — the most reliable, stable result."},{"q":"What does an in-place upgrade preserve?","a":"Installed apps and personal files while upgrading the OS version."},{"q":"Clean install vs in-place upgrade — when to choose clean?","a":"When fixing corruption or wanting maximum stability (back up and reinstall apps)."},{"q":"What is image deployment used for?","a":"Pushing a standardized OS image to many computers efficiently."},{"q":"What is PXE boot?","a":"Booting and installing an OS over the network instead of from local media."},{"q":"MBR vs GPT — capacity/partition differences?","a":"MBR caps at ~2 TB and 4 primary partitions; GPT supports huge disks and many partitions."},{"q":"Which partition scheme pairs with UEFI?","a":"GPT — required for Secure Boot and drives over 2 TB."},{"q":"Which partition scheme pairs with legacy BIOS?","a":"MBR."},{"q":"What's the default Windows filesystem and why?","a":"NTFS — it supports permissions, encryption, journaling, and large volumes."},{"q":"When would you format a drive as exFAT?","a":"For large files on removable media shared across Windows/macOS."},{"q":"What is FAT32's notable limitation?","a":"A 4 GB maximum file size (and smaller volume limits)."},{"q":"A repair install does what?","a":"Reinstalls Windows over the existing install to fix corruption while keeping data/apps where possible."},{"q":"Why back up before a clean install?","a":"It erases the drive; data not backed up is lost."},{"q":"What's a common cause of a failed UEFI install on an old disk?","a":"The disk is MBR; UEFI/Secure Boot expects GPT — convert or reconfigure firmware."},{"q":"What is a recovery partition?","a":"A reserved partition holding recovery/reset tools for the installed OS."},{"q":"Recommending Windows Home to a business that needs domain join — why wrong?","a":"Home can't join a domain or use Group Policy/BitLocker; the business needs Pro+."},{"q":"Which boot sources can install Windows?","a":"USB, DVD/ISO, network (PXE), or a recovery partition."},{"q":"Why does modern Windows install on GPT + UEFI by default?","a":"It supports large drives, more partitions, Secure Boot, and faster boot than MBR + BIOS."}]},{"id":17,"core":2,"title":"Supporting Other Operating Systems","short":"Linux & macOS","blurb":"Linux commands and permissions, package and process management, and the macOS tools the exam expects you to recognize — the non-Windows world a tech still has to support.","sections":[{"h":"17.1 Linux Essentials","blocks":[{"t":"p","text":"Linux runs much of the server and cloud world, so a tech must navigate its shell. The exam focuses on recognizing common commands, the permission model, and how software/processes are managed."},{"t":"sub","text":"Core commands"},{"t":"table","head":["Command","Does"],"rows":[["ls / cd / pwd","List / change / show directory"],["cp / mv / rm","Copy / move / remove"],["cat / grep","Show file / search text"],["chmod / chown","Change permissions / ownership"],["sudo","Run as superuser (admin)"],["ps / top / kill","List / monitor / end processes"],["apt / yum / dnf","Install packages (by distro)"],["ifconfig / ip","Network configuration"]]},{"t":"sub","text":"Permissions model"},{"t":"list","items":["Three identities: owner, group, others","Three rights: read (4), write (2), execute (1)","chmod 755 = rwx for owner, r-x for group/others","sudo grants temporary elevated privileges"]},{"t":"note","text":"How chmod numbers work in plain terms: add the values for each identity — read 4 + write 2 + execute 1. '7' is all three; '5' is read+execute; '0' is none. So 755 means the owner can do everything and everyone else can read and run but not change. This compact notation is exam-favorite."},{"t":"tip","k":"focus","text":"sudo = run one command as admin. chmod numbers: read 4, write 2, execute 1, summed per identity (owner/group/others)."}]},{"h":"17.2 Packages, Processes & Networking","blocks":[{"t":"list","items":[{"l":"Package managers","s":["apt (Debian/Ubuntu)","yum/dnf (Red Hat/Fedora)"]},{"l":"Process tools","s":["ps, top, kill, killall"]},{"l":"Root/superuser","s":["Full control — use sudo, don't log in as root routinely"]},{"l":"Filesystems","s":["ext4 common on Linux"]}]},{"t":"note","text":"Why package managers matter: instead of hunting for installers, Linux pulls vetted software (and its dependencies, plus security updates) from trusted repositories. It's centralized, safer software distribution — the model app stores later copied."}]},{"h":"17.3 macOS Essentials","blocks":[{"t":"table","head":["Feature","Purpose"],"rows":[["Finder","File manager"],["Spotlight","System-wide search"],["Mission Control","Manage windows/desktops"],["Time Machine","Automated backups"],["Disk Utility","Manage/repair disks, First Aid"],["Keychain","Stores passwords/certs securely"],["Gatekeeper","Blocks untrusted apps"],["FileVault","Full-disk encryption"]]},{"t":"note","text":"Notice the parallels to Windows: Time Machine ≈ File History/backup, FileVault ≈ BitLocker, Keychain ≈ Credential Manager, Gatekeeper ≈ SmartScreen. macOS solves the same problems with its own tools — recognizing the mapping makes cross-platform support intuitive."},{"t":"list","items":[".dmg / .pkg installers; apps in /Applications","App Store for vetted software","System Settings for configuration"]}]}],"takeaways":["Recognize core Linux commands (ls, cd, chmod, chown, sudo, ps, kill, apt/yum)","chmod numbers: read 4 + write 2 + execute 1 per owner/group/others (e.g., 755)","sudo grants temporary admin; package managers pull vetted software + dependencies","macOS tools: Time Machine (backup), FileVault (encryption), Disk Utility, Gatekeeper, Keychain","macOS tools map to Windows equivalents (FileVault≈BitLocker, Gatekeeper≈SmartScreen)"],"cards":[{"q":"What does sudo do in Linux?","a":"Runs a command with superuser (administrator) privileges temporarily."},{"q":"What do ls, cd, and pwd do?","a":"List directory contents, change directory, and print the current directory."},{"q":"What does chmod change?","a":"File/directory permissions."},{"q":"What does chown change?","a":"File/directory ownership (user and group)."},{"q":"In chmod numbers, what are read, write, execute worth?","a":"Read = 4, write = 2, execute = 1; sum them per identity."},{"q":"What does chmod 755 grant?","a":"Owner rwx (7); group and others r-x (5) — read and execute but not write."},{"q":"What three identities do Linux permissions apply to?","a":"Owner, group, and others."},{"q":"What do ps, top, and kill do?","a":"List processes, monitor processes live, and terminate a process."},{"q":"Which package manager belongs to Debian/Ubuntu?","a":"apt."},{"q":"Which package managers belong to Red Hat/Fedora?","a":"yum and dnf."},{"q":"Why are package managers safer than hunting for installers?","a":"They pull vetted software and dependencies (and updates) from trusted repositories."},{"q":"What does grep do?","a":"Searches text/files for matching patterns."},{"q":"What filesystem is common on Linux?","a":"ext4."},{"q":"What is Time Machine?","a":"macOS's automated backup system."},{"q":"What is FileVault and its Windows equivalent?","a":"macOS full-disk encryption — equivalent to BitLocker."},{"q":"What does Gatekeeper do?","a":"Blocks untrusted/unsigned apps from running on macOS."},{"q":"What is Disk Utility used for?","a":"Managing and repairing disks/volumes on macOS (First Aid)."},{"q":"What does Keychain store?","a":"Passwords, keys, and certificates securely on macOS."},{"q":"What is Spotlight?","a":"macOS system-wide search."},{"q":"Where do macOS applications normally live?","a":"In the /Applications folder; installed from .dmg/.pkg or the App Store."},{"q":"Why is recognizing macOS-to-Windows tool mappings useful?","a":"Both OSes solve the same problems differently; the mapping makes cross-platform support intuitive."}]},{"id":18,"core":2,"title":"Attacks, Threats, and Vulnerabilities","short":"Attacks & Threats","blurb":"Social engineering, malware and password attacks, web exploits, the WPA ladder, and securing a SOHO router — the threat landscape and why people are usually the weakest link.","sections":[{"h":"18.1 Social Engineering & Malware","blocks":[{"t":"p","text":"Most breaches don't start by defeating technology — they trick a person. That's why social engineering leads this module: the human is the easiest target, and recognizing the manipulation is the defense."},{"t":"sub","text":"Social engineering"},{"t":"table","head":["Attack","What it is"],"rows":[["Phishing","Fraudulent email luring credentials/clicks"],["Spear phishing","Targeted phishing at a specific person"],["Whaling","Phishing aimed at executives"],["Vishing / smishing","Voice / SMS phishing"],["Pretexting","Inventing a scenario to gain trust"],["Tailgating","Following someone through a secure door"],["Shoulder surfing","Watching someone enter credentials"],["Dumpster diving","Mining trash for info"],["Impersonation","Pretending to be staff/IT/authority"]]},{"t":"note","text":"Why social engineering works: it exploits trust, urgency, fear, and authority — feelings, not firewalls. The countermeasure is awareness and verification: slow down, confirm identity through a known channel, and never act on pressure alone."},{"t":"sub","text":"Malware types"},{"t":"table","head":["Type","Behavior"],"rows":[["Virus","Attaches to files; needs a host/user action"],["Worm","Self-replicates across networks"],["Trojan","Disguised as legitimate software"],["Ransomware","Encrypts data, demands payment"],["Spyware/Keylogger","Steals info/keystrokes"],["Rootkit","Hides deep in the OS"],["Cryptominer","Hijacks resources to mine coin"]]},{"t":"tip","k":"focus","text":"Worm = self-spreads with no user action; virus = needs a host/user action. That distinction is frequently tested."}]},{"h":"18.2 Network, Password & Web Attacks","blocks":[{"t":"list","items":[{"l":"DoS / DDoS","s":["Flood a service to take it down"]},{"l":"On-path (MITM)","s":["Intercept traffic between two parties"]},{"l":"Spoofing","s":["Fake an IP/MAC/identity"]},{"l":"Brute force / dictionary","s":["Guess passwords systematically"]},{"l":"Zero-day","s":["Exploit an unknown/unpatched flaw"]},{"l":"SQL injection / XSS","s":["Inject code via web inputs"]}]},{"t":"note","text":"How these connect to defense: each attack maps to a control — DDoS to rate-limiting/redundancy, MITM to encryption (HTTPS/VPN), brute force to lockouts/MFA, injection to input validation/patching. Knowing the attack implies the countermeasure."}]},{"h":"18.3 Wireless & SOHO Router Security","blocks":[{"t":"sub","text":"The WPA ladder"},{"t":"table","head":["Protocol","Status"],"rows":[["WEP","Broken — never use"],["WPA","Weak — avoid"],["WPA2 (AES)","Strong baseline"],["WPA3","Current best"]]},{"t":"tip","k":"focus","text":"Security order: WEP < WPA < WPA2 < WPA3. Always choose the highest both ends support (WPA2-AES minimum)."},{"t":"sub","text":"Hardening a SOHO router"},{"t":"list","items":["Change the default admin username/password","Use WPA2/WPA3 with a strong passphrase","Update firmware regularly","Disable WPS and remote management","Change the default SSID; consider a guest network","Enable the firewall; disable unused services/ports"]},{"t":"note","text":"Why defaults are dangerous: default credentials and WPS are publicly known and bot-scanned within minutes of a router going online. Changing defaults and disabling WPS removes the easiest, most-automated path in — it's the highest-value five minutes of setup."}]}],"takeaways":["Social engineering targets people via trust/urgency/fear — verify through known channels","Worm self-spreads; virus needs a host/user action; ransomware encrypts for payment","Each attack implies a control: MITM→encryption, brute force→lockout/MFA, injection→input validation","Wireless security order: WEP < WPA < WPA2 < WPA3 (use the highest supported)","Harden SOHO routers: change defaults, WPA2/3, update firmware, disable WPS/remote mgmt"],"cards":[{"q":"Why does social engineering work so well?","a":"It exploits human trust, urgency, fear, and authority rather than defeating technology."},{"q":"What is phishing?","a":"Fraudulent messages luring victims into revealing credentials or clicking malicious links."},{"q":"Spear phishing vs whaling?","a":"Spear phishing targets a specific individual; whaling targets executives/high-value people."},{"q":"What are vishing and smishing?","a":"Phishing via voice call (vishing) and via SMS text (smishing)."},{"q":"What is tailgating?","a":"Following an authorized person through a secure door without credentials."},{"q":"What is shoulder surfing?","a":"Watching someone enter passwords/PINs to steal them."},{"q":"What is pretexting?","a":"Inventing a believable scenario/identity to manipulate a victim into cooperating."},{"q":"Virus vs worm — key difference?","a":"A virus needs a host file/user action; a worm self-replicates across networks on its own."},{"q":"What does ransomware do?","a":"Encrypts the victim's data and demands payment for the decryption key."},{"q":"What is a Trojan?","a":"Malware disguised as legitimate software to trick the user into running it."},{"q":"What is a rootkit?","a":"Malware that hides deep in the OS to evade detection and maintain access."},{"q":"DoS vs DDoS?","a":"Both flood a service to take it down; DDoS uses many distributed sources at once."},{"q":"What is an on-path (man-in-the-middle) attack and its defense?","a":"Intercepting traffic between two parties; defended by encryption (HTTPS/VPN)."},{"q":"What is a brute-force attack and its defenses?","a":"Systematically guessing passwords; defended by account lockouts and MFA."},{"q":"What is a zero-day?","a":"An exploit of an unknown/unpatched vulnerability with no fix yet available."},{"q":"What is SQL injection?","a":"Inserting malicious SQL via web inputs to manipulate a database; defended by input validation."},{"q":"Order wireless security weakest to strongest.","a":"WEP < WPA < WPA2 < WPA3."},{"q":"What's the minimum acceptable Wi-Fi security today?","a":"WPA2 with AES (WPA3 preferred)."},{"q":"First thing to change on a new SOHO router?","a":"The default admin username and password."},{"q":"Why disable WPS on a router?","a":"It has known weaknesses and is bot-scanned; disabling it removes an easy automated entry path."},{"q":"Two more SOHO hardening steps beyond passwords?","a":"Update firmware regularly and disable remote management/unused services."}]},{"id":19,"core":2,"title":"Managing Security Settings","short":"Security Settings","blurb":"Account hardening, workstation execution control and encryption, browser security, and the malware-removal procedure you must perform in the right order — turning security concepts into concrete configuration.","sections":[{"h":"19.1 Account & Workstation Hardening","blocks":[{"t":"p","text":"Hardening means reducing attack surface — closing easy doors before an attacker tries them. It's the practical application of least privilege and defense in depth at the machine level."},{"t":"list","items":[{"l":"Account policies","s":["Strong password/complexity + length","Account lockout after failed attempts","Disable/rename default accounts (Guest, Administrator)","Least privilege; separate admin accounts"]},{"l":"Login security","s":["MFA where possible","Screen lock + timeout","Disable autorun/autoplay"]},{"l":"Encryption","s":["BitLocker for disks; protect data at rest"]},{"l":"Updates","s":["Patch the OS and apps promptly"]}]},{"t":"note","text":"Why disable autorun/autoplay: it historically let malware on a USB stick execute the moment it was plugged in — no click needed. Turning it off forces a human decision before code runs, closing a classic infection path. Small setting, big risk removed."},{"t":"tip","k":"focus","text":"Defense in depth = layers. No single control is enough; combine strong auth, least privilege, patching, and encryption."}]},{"h":"19.2 Browser Security","blocks":[{"t":"list","items":["Keep the browser updated (it's the most exposed app)","Install only trusted extensions; remove unused ones","Use HTTPS; watch for valid certificates","Enable pop-up and malicious-site blocking","Clear/limit cache, cookies, and saved data as needed","Use a password manager rather than reusing passwords"]},{"t":"note","text":"Why the browser is a priority target: it's the program most exposed to hostile internet content, so its flaws and shady extensions are prime infection routes. Treating the browser as a security boundary — updated, minimal extensions, HTTPS — blocks a large share of everyday attacks."}]},{"h":"19.3 Malware Removal — the ordered procedure","blocks":[{"t":"p","text":"CompTIA defines a specific best-practice sequence for removing malware. The order is tested directly — doing steps out of sequence (e.g., re-enabling restore before cleaning) can reinfect the machine."},{"t":"steps","items":["Investigate and verify malware symptoms","Quarantine the infected system (disconnect from network)","Disable System Restore (Windows)","Remediate: update anti-malware, then scan and remove","Schedule scans and run updates","Enable System Restore and create a new restore point","Educate the end user"]},{"t":"note","text":"Why this order: you disconnect first so it can't spread or phone home; you disable System Restore before cleaning so the malware isn't hiding in a restore point that would reinfect later; you re-enable Restore and make a fresh clean point only after the system is clean. Educating the user last prevents the repeat infection."},{"t":"tip","k":"focus","text":"Quarantine (disconnect) → disable System Restore → remediate → re-enable Restore → educate. The sequence is the answer."}]}],"takeaways":["Hardening reduces attack surface: strong auth, least privilege, patching, encryption, disable autorun","Defense in depth layers controls — no single one suffices","The browser is the most-exposed app: update it, minimize extensions, enforce HTTPS","Malware removal order: quarantine → disable System Restore → remediate → re-enable Restore → educate","Disable System Restore before cleaning so malware can't survive in a restore point"],"cards":[{"q":"What does 'hardening' a system mean?","a":"Reducing its attack surface by closing easy vulnerabilities before attackers exploit them."},{"q":"What is defense in depth?","a":"Layering multiple security controls so no single failure exposes the system."},{"q":"Why disable autorun/autoplay?","a":"It can auto-execute malware from removable media; disabling it forces a human decision before code runs."},{"q":"Why rename/disable default accounts like Administrator/Guest?","a":"Their names are known to attackers; removing/renaming them eliminates easy targets."},{"q":"What is account lockout policy?","a":"Locking an account after a set number of failed logins to thwart brute-force attempts."},{"q":"Why keep separate admin accounts?","a":"Least privilege — daily work runs without admin rights, limiting damage if compromised."},{"q":"Why is the browser a priority for security updates?","a":"It's the app most exposed to hostile internet content, making its flaws prime infection routes."},{"q":"Risk of untrusted browser extensions?","a":"They can read/alter pages and steal data; install only trusted ones and remove unused ones."},{"q":"How does a password manager improve security?","a":"It enables unique strong passwords per site, ending risky password reuse."},{"q":"List the CompTIA malware-removal steps in order.","a":"Investigate symptoms, quarantine, disable System Restore, remediate (update+scan), schedule scans/updates, re-enable System Restore, educate the user."},{"q":"Why quarantine (disconnect) the system first?","a":"To stop the malware spreading or communicating out while you work."},{"q":"Why disable System Restore before remediating?","a":"So malware hiding in a restore point can't reinfect the machine after cleaning."},{"q":"When do you re-enable System Restore?","a":"After the system is clean — then create a fresh, clean restore point."},{"q":"Why is educating the user the final step?","a":"To prevent the behavior that caused the infection from repeating."},{"q":"What should you update before scanning for malware?","a":"The anti-malware definitions/engine, so it can detect current threats."},{"q":"Why enforce HTTPS and check certificates in a browser?","a":"To ensure encrypted, authenticated connections and avoid spoofed sites."},{"q":"What login controls reduce unauthorized access at a desk?","a":"Screen lock with timeout, MFA, and strong passwords."},{"q":"How does disk encryption (BitLocker) harden a workstation?","a":"It protects data at rest so a stolen drive/device can't be read."},{"q":"Why patch the OS and apps promptly?","a":"Updates close known vulnerabilities before attackers exploit them."},{"q":"What's the danger of doing malware-removal steps out of order?","a":"You can reinfect the machine (e.g., from a restore point) or let it spread."},{"q":"What does least privilege accomplish on a workstation?","a":"Limits what a user/process can do, reducing the blast radius of a compromise."}]},{"id":20,"core":2,"title":"Supporting Mobile Software","short":"Mobile Software","blurb":"Mobile OS security, MDM/EMM, two-factor methods, and troubleshooting mobile OS, app, connectivity, and security issues — securing and fixing the software side of phones and tablets.","sections":[{"h":"20.1 Mobile OS Security","blocks":[{"t":"p","text":"Mobile security leans on the platform itself: vetted app stores, sandboxing, and strong device encryption by default. The support job is keeping those protections intact and managing fleets at scale."},{"t":"list","items":[{"l":"Screen lock","s":["PIN, password, pattern, biometric (face/fingerprint)"]},{"l":"Encryption","s":["On by default on modern iOS/Android"]},{"l":"App sources","s":["Official stores are vetted; sideloading raises risk"]},{"l":"Updates","s":["Patch OS and apps; old versions are vulnerable"]},{"l":"Remote features","s":["Find My / remote lock / remote wipe"]}]},{"t":"note","text":"Why jailbreaking/rooting is dangerous: it removes the sandbox and signature checks that keep one bad app from reaching the rest of the device. The 'freedom' to install anything also frees malware — it dismantles the platform's core defense, which is why MDM blocks it."},{"t":"sub","text":"MDM / EMM"},{"t":"list","items":["Enforce passcode, encryption, and update policies","Push approved apps and configurations","Separate corporate and personal data (containerization)","Remote lock/wipe lost or stolen devices"]},{"t":"sub","text":"Two-factor methods"},{"t":"list","items":["Authenticator app (TOTP codes)","Push approval","SMS code (weakest — SIM-swap risk)","Hardware security key (strongest)"]}]},{"h":"20.2 Troubleshooting Mobile Software","blocks":[{"t":"table","head":["Symptom","First moves"],"rows":[["App crashes/won't open","Update app, clear cache, reinstall"],["Slow performance","Close background apps, free storage, restart"],["Battery drains fast","Find the offending app; reduce background activity"],["Won't update","Check storage space and connectivity"],["No connectivity","Toggle airplane mode, re-pair, forget/rejoin Wi-Fi"],["Overheating","Close heavy apps; remove case while charging"],["Frozen device","Soft reset / force restart"]]},{"t":"note","text":"The mobile fix ladder, in order: restart → update → clear cache → reinstall the app → reset settings → factory reset (last resort, after backup). You climb only as far as needed, and a simple restart resolves a surprising share of issues."},{"t":"tip","k":"focus","text":"Escalate gently: restart → update → clear cache → reinstall → reset settings → factory reset (backup first)."}]},{"h":"20.3 Mobile Security Symptoms","blocks":[{"t":"list","items":["Unexpected data usage spikes → background/malicious app","Unwanted pop-ups/ads → adware or rogue app","Rapid battery drain + heat → possible crypto-miner/spyware","New unknown apps → sideloaded/malware","Account access from unknown locations → compromised credentials"]},{"t":"note","text":"How symptoms reveal compromise: malware needs resources and network access, so it leaks signs — data spikes, heat, drain, and unfamiliar apps. Treat a cluster of these as a red flag: review app permissions, remove unknown apps, change passwords, and enable MFA."}]}],"takeaways":["Mobile security relies on vetted stores, sandboxing, and default encryption — keep them intact","Jailbreaking/rooting removes the sandbox/signature checks; MDM blocks it","MDM/EMM enforces policy, separates work/personal data, and enables remote lock/wipe","2FA strength: hardware key > authenticator/push > SMS (SIM-swap risk)","Mobile fix ladder: restart → update → clear cache → reinstall → reset settings → factory reset"],"cards":[{"q":"What three platform features anchor mobile security?","a":"Vetted app stores, app sandboxing, and default device encryption."},{"q":"Why is jailbreaking/rooting a security risk?","a":"It removes sandboxing and signature checks, letting any app — including malware — reach the whole device."},{"q":"What does MDM/EMM let an organization do?","a":"Enforce passcode/encryption/update policies, push apps, separate work/personal data, and remote lock/wipe."},{"q":"What is containerization on a managed device?","a":"Separating corporate data/apps from personal ones so IT can manage/wipe only the work container."},{"q":"Order 2FA methods strongest to weakest.","a":"Hardware security key > authenticator app/push > SMS code (SIM-swap risk)."},{"q":"Why is SMS the weakest second factor?","a":"It's vulnerable to SIM swapping and interception."},{"q":"Risk of sideloading apps?","a":"Bypassing the vetted store can install malware not screened by the platform."},{"q":"An app keeps crashing. First troubleshooting moves?","a":"Update the app, clear its cache, then reinstall it."},{"q":"Mobile fix ladder in order?","a":"Restart → update → clear cache → reinstall app → reset settings → factory reset (back up first)."},{"q":"Why does a simple restart fix so many mobile issues?","a":"It clears stuck processes/memory and re-initializes radios and services."},{"q":"A phone updates fail repeatedly. Likely causes?","a":"Insufficient storage space or poor connectivity."},{"q":"No Wi-Fi connectivity on a phone. Steps?","a":"Toggle airplane mode, forget and rejoin the network, and restart; check the router."},{"q":"Unexpected spikes in data usage suggest what?","a":"A background or malicious app consuming data — investigate and remove."},{"q":"Rapid battery drain plus heat could indicate what?","a":"A runaway, mining, or spyware app abusing resources."},{"q":"Unknown new apps appear on a device. Concern?","a":"Possible sideloaded malware; review and remove, then check permissions."},{"q":"Best last-resort fix for persistent mobile issues?","a":"A factory reset — only after backing up data."},{"q":"Why keep mobile OS and apps updated?","a":"Updates patch vulnerabilities; outdated software is a common compromise route."},{"q":"What remote features help with a lost phone?","a":"Find My/location, remote lock, and remote wipe."},{"q":"Signs an account (not just the device) is compromised?","a":"Logins from unknown locations and unexpected ch
