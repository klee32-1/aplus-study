anges — change passwords and enable MFA."},{"q":"Why do mobile compromises tend to leak symptoms?","a":"Malware needs resources/network, producing data spikes, heat, drain, and unfamiliar apps."},{"q":"A managed device must enforce a passcode. What enables that?","a":"MDM policy pushed to the device."}]},{"id":21,"core":2,"title":"Using Data Security","short":"Data Security","blurb":"Backup methods and the 3-2-1 rule, regulated data classes, the incident-response sequence, destruction methods, and AI policy — protecting data across its whole life, from backup to secure disposal.","sections":[{"h":"21.1 Backup & Recovery","blocks":[{"t":"p","text":"Backups are the ultimate safety net — the one defense against ransomware, hardware death, and human error alike. The exam tests backup types and the 3-2-1 rule, plus the math of restoring them."},{"t":"sub","text":"Backup types"},{"t":"table","head":["Type","Backs up","Restore"],"rows":[["Full","Everything","Just the full — simplest"],["Incremental","Changes since last ANY backup","Full + every incremental in order"],["Differential","Changes since last FULL","Full + the latest differential"],["Synthetic full","Rebuilt from prior backups","Efficient full without re-reading all data"]]},{"t":"note","text":"Incremental vs differential, in plain terms: incrementals are small/fast to create but slow to restore (you replay the full plus every increment); differentials grow larger each day but restore fast (full plus just the latest one). It's a speed-of-backup vs speed-of-restore trade-off."},{"t":"sub","text":"The 3-2-1 rule"},{"t":"list","items":["3 copies of your data","on 2 different media types","with 1 copy offsite (or offline/immutable)"]},{"t":"tip","k":"focus","text":"Incremental = restore needs full + ALL increments. Differential = restore needs full + the LATEST differential only."}]},{"h":"21.2 Data Handling & Disposal","blocks":[{"t":"sub","text":"Regulated/sensitive data classes"},{"t":"list","items":["PII — personally identifiable information","PHI — protected health information (HIPAA)","PCI DSS — payment card data","Intellectual property / trade secrets","GDPR — EU personal data rules"]},{"t":"note","text":"Why classification drives everything: how data must be stored, encrypted, retained, and destroyed depends on its class. Regulations attach legal penalties, so a tech must recognize regulated data and apply the stricter handling it demands."},{"t":"sub","text":"Incident response sequence"},{"t":"steps","items":["Identify and verify the incident","Report through proper channels (chain of custody)","Preserve data/evidence — don't alter it","Contain and remediate","Document everything"]},{"t":"sub","text":"Secure destruction"},{"t":"table","head":["Method","Note"],"rows":[["Wipe/secure erase","Overwrites data; drive reusable"],["Degaussing","Magnetic field — works on HDDs, NOT SSDs"],["Shredding/crushing","Physical destruction"],["Incineration","Total physical destruction"]]},{"t":"note","text":"Why degaussing fails on SSDs: SSDs store data in flash cells, not on magnetic platters, so a magnetic field does nothing. For SSDs use the drive's secure-erase command or physical destruction. Matching the method to the storage type is a favorite exam point."},{"t":"tip","k":"focus","text":"Degaussing works on magnetic HDDs only. For SSDs, use secure erase or physical destruction."}]},{"h":"21.3 AI & Data Policy","blocks":[{"t":"list","items":["Don't paste confidential/PII data into public AI tools","AI output can be wrong (hallucinations) — verify it","Follow organizational AI acceptable-use policies","Mind data residency and retention when using cloud AI"]},{"t":"note","text":"The core risk: anything entered into an external AI service may leave your control. Treat AI prompts like any other channel that could expose regulated data — the same classification and handling rules apply."}]}],"takeaways":["3-2-1 rule: 3 copies, 2 media types, 1 offsite/offline","Incremental restores need full + ALL increments; differential needs full + the LATEST only","Classify data (PII/PHI/PCI/GDPR) — class dictates storage, encryption, retention, destruction","Incident response: identify → report (chain of custody) → preserve evidence → contain → document","Degaussing works on HDDs only; SSDs need secure erase or physical destruction"],"cards":[{"q":"What does the 3-2-1 backup rule state?","a":"Keep 3 copies of data, on 2 different media types, with 1 copy offsite/offline."},{"q":"What does a full backup capture?","a":"Everything selected — the simplest to restore from."},{"q":"What does an incremental backup capture?","a":"Only changes since the last backup of any kind."},{"q":"What does a differential backup capture?","a":"All changes since the last full backup."},{"q":"To restore from incrementals, what do you need?","a":"The last full backup plus every incremental since, applied in order."},{"q":"To restore from a differential, what do you need?","a":"The last full backup plus only the latest differential."},{"q":"Incremental vs differential trade-off?","a":"Incrementals back up fast but restore slowly; differentials back up larger but restore fast."},{"q":"Why are backups the ultimate defense against ransomware?","a":"A clean offline/immutable copy lets you restore without paying or losing data."},{"q":"What is PII?","a":"Personally Identifiable Information — data that can identify an individual."},{"q":"What is PHI and which law governs it?","a":"Protected Health Information, governed by HIPAA."},{"q":"What does PCI DSS protect?","a":"Payment card data and how it must be handled."},{"q":"What is GDPR?","a":"EU regulation governing the privacy and handling of personal data."},{"q":"Why does data classification drive handling?","a":"Storage, encryption, retention, and destruction requirements (and legal penalties) depend on the data class."},{"q":"List the incident-response steps in order.","a":"Identify/verify, report through proper channels (chain of custody), preserve evidence, contain/remediate, document."},{"q":"What is chain of custody?","a":"A documented record of who handled evidence and when, preserving its integrity."},{"q":"Why preserve evidence before remediating?","a":"Altering or cleaning too early can destroy proof needed for investigation/legal action."},{"q":"Does degaussing work on SSDs? Why or why not?","a":"No — SSDs use flash cells, not magnetic platters, so a magnetic field has no effect."},{"q":"How do you securely destroy data on an SSD?","a":"Use the drive's secure-erase command or physically destroy it (shred/crush)."},{"q":"What destruction method suits a magnetic HDD?","a":"Degaussing, or physical shredding/crushing."},{"q":"Why avoid pasting confidential data into public AI tools?","a":"The data may leave your control; the same classification/handling rules apply."},{"q":"Why must AI output be verified?","a":"AI can hallucinate — produce confident but incorrect information."}]},{"id":22,"core":2,"title":"Implementing Operational Procedures","short":"Operational Procedures","blurb":"Change and asset management, the safety and environmental rules that are heavily tested, and scripting fundamentals — the professional disciplines that keep IT safe, accountable, and repeatable.","sections":[{"h":"22.1 Change & Asset Management","blocks":[{"t":"p","text":"Mature IT doesn't change things on a whim. Change management ensures modifications are planned, approved, reversible, and communicated — so one change doesn't quietly break something else for everyone."},{"t":"sub","text":"A change request includes"},{"t":"list","items":[{"l":"Documented change","s":["Purpose, scope, and plan"]},{"l":"Risk analysis","s":["What could go wrong"]},{"l":"Rollback plan","s":["How to undo it"]},{"l":"Approval","s":["Sign-off (often a change board)"]},{"l":"End-user acceptance","s":["Confirm it meets the need"]}]},{"t":"note","text":"Why the rollback plan is non-negotiable: every change can fail, and the rollback is your guaranteed exit. Planning the undo before you start turns a potential outage into a quick reversal — it's the safety net that makes change safe."},{"t":"sub","text":"Asset & inventory management"},{"t":"list","items":["Track hardware/software (tags, licenses, warranty)","Database of assets and configurations","Procurement and lifecycle/retirement records"]}]},{"h":"22.2 Safety & Environmental Procedures","blocks":[{"t":"p","text":"These rules protect people, equipment, and the planet — and they're tested heavily. Many are about doing the right, documented thing even when a shortcut is tempting."},{"t":"sub","text":"Personal & equipment safety"},{"t":"list","items":["ESD: wrist strap (bonded), anti-static mat/bag","NEVER wear a wrist strap on CRTs or PSUs (stored high voltage)","Remove jewelry; disconnect power before servicing","Lift with your legs; use proper equipment","Fire: use a Class C extinguisher on electrical fires"]},{"t":"tip","k":"focus","text":"Electrical fire = Class C extinguisher. Never use water on energized electrical equipment."},{"t":"sub","text":"Environmental & documents"},{"t":"list","items":[{"l":"MSDS / SDS","s":["Safety Data Sheet — how to handle/dispose of chemicals & batteries"]},{"l":"Battery/toner disposal","s":["Recycle per regulations — don't trash"]},{"l":"Temperature & humidity","s":["Control to prevent overheating and ESD"]},{"l":"Power protection","s":["Surge protector (spikes) vs UPS (battery backup + clean shutdown)"]}]},{"t":"note","text":"Surge protector vs UPS is a classic confusion: a surge protector only absorbs voltage spikes; a UPS adds a battery that keeps the system running through an outage long enough to save work and shut down cleanly. Critical systems need a UPS, not just a power strip."},{"t":"sub","text":"Compliance & privacy"},{"t":"list","items":["Follow licensing (avoid pirated software)","Handle PII/regulated data per policy and law","Incident reporting and prohibited-content procedures"]}]},{"h":"22.3 Scripting Basics","blocks":[{"t":"p","text":"Scripting automates repetitive tasks — the same fix applied to 500 machines without 500 manual sessions. The exam wants you to recognize script types, basic constructs, and the risks of running scripts."},{"t":"table","head":["Extension","Language/use"],"rows":[[".bat","Windows batch"],[".ps1","PowerShell"],[".sh","Linux/Unix shell"],[".py","Python"],[".vbs","VBScript (legacy)"],[".js","JavaScript"]]},{"t":"list","items":["Variables, loops, conditionals, comments","Common uses: backups, mapping drives, installs, updates, maintenance","Risks: a bad script can break many systems fast; test first and limit scope"]},{"t":"note","text":"Why scripting power cuts both ways: automation's strength — doing the same thing everywhere instantly — is also its danger. A mistake propagates as fast as the fix. So you test on one machine, use least privilege, and keep a rollback before unleashing a script broadly."},{"t":"tip","k":"tip","text":"Recognize script types by extension: .ps1 PowerShell, .bat batch, .sh shell, .py Python, .vbs VBScript."}]}],"takeaways":["Change management = documented change, risk analysis, rollback plan, approval, user acceptance","The rollback plan is the non-negotiable safety net for every change","Electrical fire → Class C extinguisher; never wear a wrist strap on CRTs/PSUs","Surge protector absorbs spikes; a UPS adds battery backup for clean shutdown","Recognize script types (.ps1, .bat, .sh, .py); automation's power magnifies mistakes — test first"],"cards":[{"q":"What does change management ensure?","a":"Changes are planned, risk-assessed, approved, reversible, and communicated before implementation."},{"q":"What does a change request include?","a":"Documented purpose/scope, risk analysis, rollback plan, approval, and end-user acceptance."},{"q":"Why is a rollback plan non-negotiable?","a":"Any change can fail; the rollback is the guaranteed way to undo it and avoid an outage."},{"q":"What is asset/inventory management?","a":"Tracking hardware/software, licenses, warranties, configurations, and lifecycle/retirement."},{"q":"Which fire extinguisher class is for electrical fires?","a":"Class C."},{"q":"Why never use water on an electrical fire?","a":"Water conducts electricity, risking shock and spreading the hazard."},{"q":"When must you NOT wear an anti-static wrist strap?","a":"When working on CRT monitors or power supplies — they store dangerous high voltage."},{"q":"What is an MSDS/SDS?","a":"A Safety Data Sheet describing safe handling, storage, and disposal of a substance."},{"q":"How should batteries and toner be disposed of?","a":"Recycled per regulations and the SDS — never thrown in regular trash."},{"q":"Surge protector vs UPS?","a":"A surge protector only absorbs voltage spikes; a UPS adds battery backup for ride-through and clean shutdown."},{"q":"Which power device do critical systems need and why?","a":"A UPS — it keeps systems running during an outage long enough to save work and shut down safely."},{"q":"Why control temperature and humidity in IT spaces?","a":"To prevent overheating and to reduce static (ESD) risk."},{"q":"What is the risk of running pirated/unlicensed software?","a":"Legal liability and security risk; always follow licensing terms."},{"q":"What does scripting automate?","a":"Repetitive tasks — applying the same action across many machines without manual repetition."},{"q":"Which extension is a PowerShell script?","a":".ps1"},{"q":"Which extension is a Windows batch file?","a":".bat"},{"q":"Which extension is a Linux/Unix shell script?","a":".sh"},{"q":"Which extension is a Python script?","a":".py"},{"q":"Name three basic scripting constructs.","a":"Variables, loops, and conditionals (plus comments)."},{"q":"Why is a faulty script especially dangerous?","a":"Automation propagates a mistake as fast as a fix — test on one system and keep a rollback first."},{"q":"Common safe-scripting practices?","a":"Test on a single machine, use least privilege, limit scope, and keep a rollback."}]}];
/* ============================================================

   Vanilla JS. No localStorage (uses window.storage w/ fallback).

(function () {
  "use strict";

  var TOTAL = MODULES.length;
  var byId = {};
  MODULES.forEach(function (m) { byId[m.id] = m; });

  /* ---- official exam domain weightings ---- */
  var DOMAINS = {
    c1: { exam: "Core 1 · 220-1201", rows: [
      ["1.0  Mobile Devices", 13],
      ["2.0  Networking", 23],
      ["3.0  Hardware", 25],
      ["4.0  Virtualization & Cloud Computing", 11],
      ["5.0  Hardware & Network Troubleshooting", 28]
    ]},
    c2: { exam: "Core 2 · 220-1202", rows: [
      ["1.0  Operating Systems", 28],
      ["2.0  Security", 28],
      ["3.0  Software Troubleshooting", 23],
      ["4.0  Operational Procedures", 21]
    ]}
  };

  /* ---------- progress persistence ---------- */
  var DONE = {};                 // { id: true }
  var STORE_KEY = "aplus:strata:done";
  var memOnly = false;

  function persist() {
    var ids = Object.keys(DONE).filter(function (k) { return DONE[k]; }).map(Number);
    if (memOnly) return;
    try {
      var p = window.storage && window.storage.set(STORE_KEY, JSON.stringify(ids), false);
      if (p && p.catch) p.catch(function () { memOnly = true; });
    } catch (e) { memOnly = true; }
  }

  function loadProgress() {
    return new Promise(function (resolve) {
      var done = false;
      var finish = function () { if (!done) { done = true; resolve(); } };
      try {
        if (!window.storage || !window.storage.get) { memOnly = true; return finish(); }
        var r = window.storage.get(STORE_KEY, false);
        if (r && r.then) {
          r.then(function (res) {
            try {
              if (res && res.value) JSON.parse(res.value).forEach(function (id) { DONE[id] = true; });
            } catch (e) {}
            finish();
          }).catch(function () { memOnly = true; finish(); });
        } else { finish(); }
      } catch (e) { memOnly = true; finish(); }
      setTimeout(finish, 1200); // never hang on load
    });
  }

  /* ---------- helpers ---------- */
  var $ = function (s, r) { return (r || document).querySelector(s); };
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }
  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }

  var app = $("#app");
  var content = $("#content");
  var layersNav = $("#layers");

  /* ---------- sidebar (strata) ---------- */
  function buildLayers() {
    layersNav.innerHTML = "";
    var groups = [
      { core: 1, label: "Core 1 · Hardware & Networks" },
      { core: 2, label: "Core 2 · Software & Security" }
    ];
    groups.forEach(function (g) {
      layersNav.appendChild(el("div", "group-h", esc(g.label)));
      MODULES.filter(function (m) { return m.core === g.core; }).forEach(function (m) {
        var b = el("button", "layer");
        b.dataset.id = m.id;
        b.dataset.search = (m.title + " " + (m.short || "") + " " + (m.blurb || "")).toLowerCase();
        b.innerHTML =
          '<span class="num">' + pad(m.id) + '</span>' +
          '<span class="ttl">' + esc(m.short || m.title) + '</span>' +
          '<span class="tick"></span>';
        b.addEventListener("click", function () { openModule(m.id, true); });
        layersNav.appendChild(b);
      });
    });
    syncLayerState();
  }

  function syncLayerState() {
    var done = 0;
    Array.prototype.forEach.call(layersNav.querySelectorAll(".layer"), function (b) {
      var id = +b.dataset.id;
      b.classList.toggle("done", !!DONE[id]);
      b.classList.toggle("active", id === currentId);
      if (DONE[id]) done++;
    });
    var pct = Math.round((done / TOTAL) * 100);
    $("#progN").innerHTML = done + "<em> / " + TOTAL + "</em>";
    $("#progBar").style.width = pct + "%";
    $("#tpProg").textContent = done + "/" + TOTAL;
  }

  /* ---------- block renderer ---------- */
  function renderList(b) {
    var ul = el("ul", "bul");
    (b.items || []).forEach(function (it) {
      var li = document.createElement("li");
      if (typeof it === "string") {
        li.innerHTML = esc(it);
      } else {
        li.innerHTML = '<span class="lab">' + esc(it.l) + "</span>";
        if (it.s && it.s.length) {
          var sub = el("ul", "sub-bul");
          it.s.forEach(function (x) { sub.appendChild(el("li", null, esc(x))); });
          li.appendChild(sub);
        }
      }
      ul.appendChild(li);
    });
    return ul;
  }

  function renderBlock(b) {
    switch (b.t) {
      case "p":
        return el("p", null, esc(b.text));
      case "sub":
        return el("div", "sub", esc(b.text));
      case "note":
        var n = el("div", "note");
        n.innerHTML = '<div class="nh">In plain terms</div><p>' + esc(b.text) + "</p>";
        return n;
      case "list":
        return renderList(b);
      case "steps":
        var ol = el("ol", "steps");
        (b.items || []).forEach(function (s) { ol.appendChild(el("li", null, esc(s))); });
        return ol;
      case "tip":
        var t = el("div", "tip " + (b.k === "focus" ? "focus" : "tip-t"));
        var tag = b.k === "focus" ? "Exam focus" : "Tip";
        t.innerHTML = '<span class="tg">' + tag + '</span><p>' + esc(b.text) + "</p>";
        return t;
      case "code":
        var pre = el("pre", "code");
        pre.textContent = b.text;
        return pre;
      case "table":
        var tbl = el("table", "dt");
        var thead = el("thead");
        var hr = el("tr");
        (b.head || []).forEach(function (h) { hr.appendChild(el("th", null, esc(h))); });
        thead.appendChild(hr); tbl.appendChild(thead);
        var tb = el("tbody");
        (b.rows || []).forEach(function (row) {
          var tr = el("tr");
          row.forEach(function (c) { tr.appendChild(el("td", null, esc(c))); });
          tb.appendChild(tr);
        });
        tbl.appendChild(tb);
        var wrap = el("div"); wrap.style.overflowX = "auto"; wrap.style.margin = "0 0 18px";
        wrap.appendChild(tbl);
        return wrap;
      default:
        return el("p", null, esc(b.text || ""));
    }
  }

  /* ---------- reader view ---------- */
  function openModule(id, fromNav) {
    var m = byId[id];
    if (!m) return;
    currentId = id;

    var frag = document.createDocumentFragment();

    // head
    var head = el("div", "r-head");
    var eye = el("div");
    eye.style.cssText = "font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px";
    eye.textContent = "Module " + pad(m.id) + " · Core " + m.core;
    head.appendChild(eye);
    head.appendChild(el("h2", null, esc(m.title)));
    if (m.blurb) {
      var bl = el("p", null, esc(m.blurb));
      bl.style.cssText = "font-size:18px;color:var(--ink-2);max-width:64ch;margin:0 0 22px";
      head.appendChild(bl);
    }
    var mark = el("button", "markbtn" + (DONE[id] ? " done" : ""));
    mark.innerHTML = '<span class="box"></span><span class="lbl">' +
      (DONE[id] ? "Completed" : "Mark complete") + "</span>";
    mark.addEventListener("click", function () {
      DONE[id] = !DONE[id];
      mark.classList.toggle("done", !!DONE[id]);
      $(".lbl", mark).textContent = DONE[id] ? "Completed" : "Mark complete";
      syncLayerState();
      persist();
    });
    head.appendChild(mark);
    frag.appendChild(head);

    // sections
    (m.sections || []).forEach(function (sec, i) {
      var s = el("section", "section");
      var sh = el("div", "s-h");
      sh.innerHTML = '<span style="font-weight:700">' + pad(i + 1) + "</span>" + esc(sec.h);
      s.appendChild(sh);
      (sec.blocks || []).forEach(function (b) { s.appendChild(renderBlock(b)); });
      frag.appendChild(s);
    });

    // takeaways
    if (m.takeaways && m.takeaways.length) {
      var tk = el("div", "takeaways");
      tk.appendChild(el("h4", null, '<span class="pk">Strata</span> Key takeaways'));
      var ul = el("ul");
      m.takeaways.forEach(function (t) { ul.appendChild(el("li", null, esc(t))); });
      tk.appendChild(ul);
      frag.appendChild(tk);
    }

    // flashcards
    if (m.cards && m.cards.length) {
      frag.appendChild(el("div", "fc-head", "Flashcards · self-check"));
      frag.appendChild(el("p", "fc-sub", "Tap a card to flip. Cover the answer and recall it first."));
      var grid = el("div", "fc-grid");
      m.cards.forEach(function (c) {
        var card = el("button", "fc");
        card.innerHTML =
          '<div class="fc-inner">' +
            '<div class="fc-face fc-q"><span class="fc-tag">Q</span><span class="fc-txt">' + esc(c.q) + "</span></div>" +
            '<div class="fc-face fc-a"><span class="fc-tag">A</span><span class="fc-txt">' + esc(c.a) + "</span></div>" +
          "</div>";
        card.addEventListener("click", function () { card.classList.toggle("flip"); });
        grid.appendChild(card);
      });
      frag.appendChild(grid);
    }

    // prev / next
    var idx = MODULES.findIndex(function (x) { return x.id === id; });
    var prev = MODULES[idx - 1], next = MODULES[idx + 1];
    var nav = el("div", "r-nav");
    var pb = el("button", "prev");
    pb.disabled = !prev;
    pb.innerHTML = '<div class="dir">← Previous</div><div class="nm">' +
      (prev ? esc(prev.short || prev.title) : "—") + "</div>";
    if (prev) pb.addEventListener("click", function () { openModule(prev.id, true); });
    var nb = el("button", "next");
    nb.disabled = !next;
    nb.innerHTML = '<div class="dir">Next →</div><div class="nm">' +
      (next ? esc(next.short || next.title) : "—") + "</div>";
    if (next) nb.addEventListener("click", function () { openModule(next.id, true); });
    nav.appendChild(pb); nav.appendChild(nb);
    frag.appendChild(nav);

    content.innerHTML = "";
    content.appendChild(frag);
    window.scrollTo(0, 0);
    content.parentElement.scrollTop = 0;
    syncLayerState();
    if (fromNav) closeDrawer();
  }

  /* ---------- overview view ---------- */
  function openOverview() {
    currentId = null;
    var frag = document.createDocumentFragment();

    var hero = el("div", "hero");
    hero.innerHTML =
      '<div class="eyebrow">CompTIA A+ · 220-1201 &amp; 220-1202</div>' +
      '<h1>Dig through every layer of the <span>A+</span> exam.</h1>' +
      '<p>All ' + TOTAL + ' modules of Core 1 and Core 2, rebuilt as readable strata — ' +
      'hardware and networks first, then operating systems and security. Each layer adds ' +
      'plain-language clarifications and self-check flashcards on top of the source material.</p>';
    var meta = el("div", "meta");
    var c1 = MODULES.filter(function (m) { return m.core === 1; }).length;
    var c2 = MODULES.filter(function (m) { return m.core === 2; }).length;
    var cards = MODULES.reduce(function (a, m) { return a + (m.cards ? m.cards.length : 0); }, 0);
    [[TOTAL, "Modules"], [c1, "Core 1"], [c2, "Core 2"], [cards, "Flashcards"]].forEach(function (x) {
      meta.appendChild(el("div", null, "<b>" + x[0] + "</b><small>" + x[1] + "</small>"));
    });
    hero.appendChild(meta);
    frag.appendChild(hero);

    // exam blueprint — official domain weightings
    var bp = el("div", "blueprint");
    bp.appendChild(el("div", "fc-head", "Exam blueprint · what each test weights"));
    bp.appendChild(el("p", "bp-intro",
      "The two exams are scored across weighted domains. The bars below show the official " +
      "percentage each domain contributes — a guide to where your study time pays off most."));
    var bpGrid = el("div", "bp-grid");
    [["c1", "bp-c1"], ["c2", "bp-c2"]].forEach(function (pair) {
      var d = DOMAINS[pair[0]];
      var col = el("div", "bp-col " + pair[1]);
      col.appendChild(el("h5", null, "Exam"));
      col.appendChild(el("div", "bp-exam", esc(d.exam)));
      d.rows.forEach(function (r) {
        var row = el("div", "bp-row");
        row.innerHTML =
          '<div class="bp-top"><span class="bp-name">' + esc(r[0]) +
          '</span><span class="bp-pct">' + r[1] + '%</span></div>' +
          '<div class="bp-track"><div class="bp-fill" style="width:' + r[1] + '%"></div></div>';
        col.appendChild(row);
      });
      bpGrid.appendChild(col);
    });
    bp.appendChild(bpGrid);
    bp.appendChild(el("p", "bp-note",
      "Source: CompTIA A+ 220-1201 & 220-1202 (V15) exam objectives. Percentages are approximate and set by CompTIA."));
    frag.appendChild(bp);

    [{ core: 1, label: "Core 1 · Hardware & Networks" },
     { core: 2, label: "Core 2 · Software & Security" }].forEach(function (g) {
      var gh = el("div", "fc-head");
      gh.style.marginTop = "8px";
      gh.textContent = g.label;
      frag.appendChild(gh);
      var grid = el("div", "grid");
      grid.style.marginBottom = "10px";
      MODULES.filter(function (m) { return m.core === g.core; }).forEach(function (m) {
        var card = el("button", "card" + (DONE[m.id] ? " done" : ""));
        card.dataset.core = m.core;
        card.innerHTML =
          '<div class="cnum"><span>MODULE ' + pad(m.id) + '</span><span class="cdot"></span></div>' +
          "<h3>" + esc(m.title) + "</h3>" +
          "<p>" + esc(m.short || m.blurb || "") + "</p>";
        card.addEventListener("click", function () { openModule(m.id, true); });
        grid.appendChild(card);
      });
      frag.appendChild(grid);
    });

    content.innerHTML = "";
    content.appendChild(frag);
    window.scrollTo(0, 0);
    syncLayerState();
    closeDrawer();
  }

  /* ---------- search ---------- */
  function wireSearch() {
    var inp = $("#search");
    inp.addEventListener("input", function () {
      var q = inp.value.trim().toLowerCase();
      Array.prototype.forEach.call(layersNav.querySelectorAll(".layer"), function (b) {
        b.classList.toggle("hide", q && b.dataset.search.indexOf(q) === -1);
      });
      Array.prototype.forEach.call(layersNav.querySelectorAll(".group-h"), function (gh) {
        var n = gh.nextElementSibling, anyVisible = false;
        while (n && n.classList.contains("layer")) {
          if (!n.classList.contains("hide")) anyVisible = true;
          n = n.nextElementSibling;
        }
        gh.style.display = anyVisible ? "" : "none";
      });
    });
  }

  /* ---------- mobile drawer ---------- */
  function closeDrawer() { app.classList.remove("nav-open"); }
  function wireDrawer() {
    $("#hamb").addEventListener("click", function () { app.classList.toggle("nav-open"); });
    $("#scrim").addEventListener("click", closeDrawer);
  }

  /* ---------- reset ---------- */
  function wireReset() {
    $("#resetBtn").addEventListener("click", function () {
      if (!window.confirm("Clear all progress? This resets every completed module.")) return;
      DONE = {};
      persist();
      syncLayerState();
      if (currentId) openModule(currentId, false); else openOverview();
    });
  }

  /* ---------- boot ---------- */
  var currentId = null;
  $("#homeBtn").addEventListener("click", openOverview);

  buildLayers();
  wireSearch();
  wireDrawer();
  wireReset();

  loadProgress().then(function () {
    buildLayers();
    openOverview();
  });
})();

</script>
</body>
</html>
