<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A+ Strata &mdash; CompTIA A+ Core 1 &amp; 2 Field Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E7DDC8;        /* warm sand canvas */
  --paper-2:#F2EBDA;      /* card */
  --paper-3:#F8F3E7;      /* lightest surface */
  --ink:#2B2218;          /* espresso text */
  --ink-2:#5C5142;        /* muted brown */
  --ink-3:#938straight;   /* faint (overwritten below) */
  --ink-3:#94886F;        /* faint label */
  --clay:#A65A38;         /* terracotta accent */
  --clay-deep:#8A4A2E;
  --moss:#5D6745;         /* deep olive: core2 / done */
  --moss-deep:#49512F;
  --ochre:#B6862B;        /* golden ochre: exam tips */
  --ochre-soft:#E8DDB8;
  --line:#D6C9AC;         /* hairline */
  --line-soft:#E0D5BC;
  --stone:#CDBF9F;
  --shadow:0 1px 0 rgba(43,34,24,.04), 0 8px 28px -18px rgba(43,34,24,.35);
  --rad:3px;
  --sidebar:316px;
  --disp:"Bricolage Grotesque", system-ui, sans-serif;
  --body:"Newsreader", Georgia, serif;
  --mono:"JetBrains Mono", ui-monospace, monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:var(--body); font-size:17px; line-height:1.62;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
::selection{background:var(--clay); color:var(--paper-3)}
:focus-visible{outline:2px solid var(--clay); outline-offset:2px; border-radius:2px}

/* ---------- layout ---------- */
.app{display:grid; grid-template-columns:var(--sidebar) 1fr; min-height:100vh}

/* ---------- sidebar / strata ---------- */
.strata{
  position:sticky; top:0; align-self:start; height:100vh; overflow:hidden;
  background:linear-gradient(180deg,#EFE7D4,#E4DAC2);
  border-right:1px solid var(--line);
  display:flex; flex-direction:column;
}
.brand{padding:22px 22px 16px; border-bottom:1px solid var(--line-soft)}
.brand-mark{display:flex; align-items:baseline; gap:9px}
.brand-mark b{
  font-family:var(--disp); font-weight:800; font-size:21px; letter-spacing:-.02em;
  color:var(--ink);
}
.brand-mark .dot{width:8px;height:8px;border-radius:50%;background:var(--clay);transform:translateY(-2px)}
.brand-sub{font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); margin-top:7px}

.progress-wrap{padding:14px 22px 10px}
.progress-line{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px}
.progress-line .n{font-family:var(--disp); font-weight:700; font-size:14px; color:var(--ink)}
.progress-line .n em{color:var(--ink-3); font-style:normal; font-weight:500}
.progress-line .lbl{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3)}
.bar{height:5px; background:#D8CBAD; border-radius:4px; overflow:hidden}
.bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--moss),var(--clay)); transition:width .5s cubic-bezier(.2,.8,.2,1)}

.searchbox{margin:6px 22px 12px; position:relative}
.searchbox input{
  width:100%; padding:9px 12px 9px 30px; font-family:var(--mono); font-size:12px;
  background:var(--paper-3); border:1px solid var(--line); border-radius:var(--rad); color:var(--ink);
}
.searchbox input::placeholder{color:var(--ink-3)}
.searchbox svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); width:13px; height:13px; stroke:var(--ink-3)}

.layers{flex:1; overflow-y:auto; padding:4px 12px 26px}
.layers::-webkit-scrollbar{width:9px}
.layers::-webkit-scrollbar-thumb{background:var(--stone); border-radius:8px; border:2px solid transparent; background-clip:content-box}
.group-h{
  font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--ink-3); padding:16px 10px 7px; display:flex; align-items:center; gap:8px;
}
.group-h::after{content:""; flex:1; height:1px; background:var(--line-soft)}

.layer{
  display:grid; grid-template-columns:30px 1fr auto; align-items:center; gap:10px;
  width:100%; text-align:left; padding:9px 10px; border-radius:var(--rad);
  border:1px solid transparent; margin-bottom:1px; color:var(--ink-2);
  transition:background .14s, border-color .14s, color .14s;
}
.layer:hover{background:#EDE4CF}
.layer .num{
  font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink-3);
  text-align:right; transition:color .14s;
}
.layer .ttl{font-family:var(--disp); font-weight:500; font-size:13.5px; line-height:1.25; letter-spacing:-.01em}
.layer .tick{width:15px; height:15px; border-radius:50%; border:1.5px solid var(--stone); flex:none; position:relative; transition:.16s}
.layer.done .tick{background:var(--moss); border-color:var(--moss)}
.layer.done .tick::after{content:""; position:absolute; left:4.5px; top:1.5px; width:4px; height:8px; border:solid var(--paper-3); border-width:0 1.7px 1.7px 0; transform:rotate(43deg)}
.layer.done .ttl{color:var(--ink-3)}
.layer.active{background:var(--ink); border-color:var(--ink); color:var(--paper-3)}
.layer.active .num{color:var(--clay)}
.layer.active .ttl{color:var(--paper-3)}
.layer.active .tick{border-color:var(--paper-3)}
.layer.active.done .tick{background:var(--clay); border-color:var(--clay)}
.layer.hide{display:none}

.reset-btn{margin:4px 22px 14px; font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3); display:inline-flex; align-items:center; gap:6px}
.reset-btn:hover{color:var(--clay)}

/* ---------- main ---------- */
.main{min-width:0; position:relative}
.topbar{display:none}
.content{max-width:820px; margin:0 auto; padding:54px 56px 120px}

/* overview */
.hero{margin-bottom:46px}
.hero .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--clay); margin-bottom:18px}
.hero h1{
  font-family:var(--disp); font-weight:800; font-size:clamp(38px,6vw,62px); line-height:.98;
  letter-spacing:-.035em; margin:0 0 20px; color:var(--ink);
}
.hero h1 span{color:var(--clay)}
.hero p{font-size:19px; color:var(--ink-2); max-width:60ch; margin:0}
.hero .meta{display:flex; gap:26px; margin-top:28px; flex-wrap:wrap}
.hero .meta div{display:flex; flex-direction:column}
.hero .meta b{font-family:var(--disp); font-weight:700; font-size:26px; color:var(--ink); line-height:1}
.hero .meta small{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); margin-top:6px}

.ov-coreh{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); margin:40px 0 16px; display:flex; align-items:center; gap:12px}
.ov-coreh::after{content:""; flex:1; height:1px; background:var(--line)}
.ov-coreh em{font-style:normal; color:var(--clay)}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(232px,1fr)); gap:13px}
.card{
  text-align:left; background:var(--paper-2); border:1px solid var(--line);
  border-radius:var(--rad); padding:18px 18px 20px; position:relative; overflow:hidden;
  transition:transform .16s, box-shadow .16s, border-color .16s; box-shadow:var(--shadow);
}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--clay); opacity:.0; transition:.16s}
.card[data-core="2"]::before{background:var(--moss)}
.card:hover{transform:translateY(-3px)}
.card:hover::before{opacity:1}
.card .cnum{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink-3); display:flex; justify-content:space-between; align-items:center}
.card .cdot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--stone)}
.card.done .cdot{background:var(--moss); border-color:var(--moss); position:relative}
.card.done .cdot::after{content:"";position:absolute;left:3.6px;top:1px;width:3.5px;height:7px;border:solid var(--paper-3);border-width:0 1.5px 1.5px 0;transform:rotate(43deg)}
.card h3{font-family:var(--disp); font-weight:600; font-size:18px; line-height:1.16; letter-spacing:-.015em; margin:13px 0 8px; color:var(--ink)}
.card p{font-size:13.5px; line-height:1.5; color:var(--ink-2); margin:0; font-family:var(--body)}

/* ---------- reader ---------- */
.r-head{margin-bottom:30px; padding-bottom:26px; border-bottom:2px solid var(--ink)}
.r-top{display:flex; align-items:center; gap:14px; margin-bottom:20px; flex-wrap:wrap}
.r-num{font-family:var(--mono); font-size:12px; font-weight:600; color:var(--clay); letter-spacing:.08em}
.badge{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; padding:4px 9px; border-radius:20px; border:1px solid var(--line); color:var(--ink-2)}
.badge.c1{background:#F0E4D0; border-color:#E0CBA8; color:var(--clay-deep)}
.badge.c2{background:#E6E9DC; border-color:#CFD6BC; color:var(--moss-deep)}
.r-head h2{font-family:var(--disp); font-weight:800; font-size:clamp(30px,4.6vw,46px); line-height:1.02; letter-spacing:-.03em; margin:0 0 16px; color:var(--ink)}
.r-blurb{font-size:18.5px; color:var(--ink-2); max-width:62ch; margin:0 0 22px}
.markbtn{
  display:inline-flex; align-items:center; gap:9px; font-family:var(--mono); font-size:11px;
  letter-spacing:.1em; text-transform:uppercase; padding:9px 16px; border-radius:var(--rad);
  border:1.5px solid var(--ink); color:var(--ink); transition:.16s;
}
.markbtn:hover{background:var(--ink); color:var(--paper-3)}
.markbtn .box{width:14px;height:14px;border:1.5px solid currentColor;border-radius:3px;position:relative}
.markbtn.done{background:var(--moss); border-color:var(--moss); color:var(--paper-3)}
.markbtn.done:hover{background:var(--moss-deep); border-color:var(--moss-deep)}
.markbtn.done .box{background:var(--paper-3); border-color:var(--paper-3)}
.markbtn.done .box::after{content:"";position:absolute;left:3.5px;top:.5px;width:4px;height:8px;border:solid var(--moss);border-width:0 1.7px 1.7px 0;transform:rotate(43deg)}

/* sections */
.section{margin:36px 0}
.section > .s-h{
  font-family:var(--mono); font-size:12px; font-weight:600; letter-spacing:.06em; color:var(--clay);
  padding-bottom:9px; margin:0 0 18px; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:baseline;
}
.sub{font-family:var(--disp); font-weight:600; font-size:18px; letter-spacing:-.01em; color:var(--ink); margin:26px 0 11px}
.section p{margin:0 0 14px; color:var(--ink)}

ul.bul{list-style:none; margin:0 0 16px; padding:0}
ul.bul > li{position:relative; padding-left:22px; margin:7px 0; color:var(--ink)}
ul.bul > li::before{content:""; position:absolute; left:4px; top:.72em; width:6px; height:6px; background:var(--clay); border-radius:1px; transform:rotate(45deg)}
ul.bul li .lab{font-weight:600}
ul.bul ul.sub-bul{list-style:none; margin:6px 0 4px; padding:0}
ul.bul ul.sub-bul > li{position:relative; padding-left:20px; margin:4px 0; color:var(--ink-2); font-size:16px}
ul.bul ul.sub-bul > li::before{content:""; position:absolute; left:5px; top:.74em; width:6px; height:1.5px; background:var(--stone)}

ol.steps{counter-reset:s; list-style:none; margin:0 0 18px; padding:0}
ol.steps > li{
  position:relative; padding:9px 0 9px 46px; border-bottom:1px solid var(--line-soft); color:var(--ink);
}
ol.steps > li:last-child{border-bottom:none}
ol.steps > li::before{
  counter-increment:s; content:counter(s,decimal-leading-zero);
  position:absolute; left:0; top:9px; font-family:var(--mono); font-size:12px; font-weight:600;
  color:var(--clay); width:30px; text-align:right;
}

/* callouts */
.note{
  background:var(--paper-3); border-left:3px solid var(--clay); border-radius:0 var(--rad) var(--rad) 0;
  padding:15px 18px 15px 20px; margin:18px 0; position:relative;
}
.note .nh{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--clay); margin-bottom:6px; font-weight:600}
.note p{margin:0; font-size:16px; line-height:1.56; color:var(--ink-2)}
.note em{font-style:italic; color:var(--ink)}

.tip{display:flex; gap:13px; padding:13px 17px; margin:16px 0; border-radius:var(--rad); align-items:flex-start}
.tip.focus{background:#F2E5CF; border:1px solid #E5D2AC}
.tip.tip-t{background:#E9ECDD; border:1px solid #D3DAC0}
.tip .tg{font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:600; padding:3px 7px; border-radius:3px; flex:none; margin-top:1px}
.tip.focus .tg{background:var(--ochre); color:#3b2c08}
.tip.tip-t .tg{background:var(--moss); color:var(--paper-3)}
.tip p{margin:0; font-size:15.5px; line-height:1.5; color:var(--ink)}

/* table */
.tbl-wrap{margin:16px 0; border:1px solid var(--line); border-radius:var(--rad); overflow:hidden}
table.dt{width:100%; border-collapse:collapse; font-size:15px}
table.dt th{
  background:var(--ink); color:var(--paper-3); font-family:var(--mono); font-weight:500;
  font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; text-align:left; padding:9px 14px;
}
table.dt td{padding:9px 14px; border-bottom:1px solid var(--line-soft); color:var(--ink); vertical-align:top}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:nth-child(even) td{background:var(--paper-3)}
table.dt td:first-child{font-weight:600; font-family:var(--disp); white-space:nowrap}

/* code */
pre.code{
  font-family:var(--mono); font-size:13px; line-height:1.65; background:var(--ink); color:#EAE0CB;
  padding:15px 18px; border-radius:var(--rad); overflow-x:auto; margin:16px 0; white-space:pre;
}
pre.code .cm{color:#A99C7E}

/* takeaways */
.takeaways{background:linear-gradient(180deg,#2B2218,#352A1C); color:var(--paper-3); border-radius:var(--rad); padding:28px 30px; margin:42px 0 34px}
.takeaways h4{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ochre); margin:0 0 16px; display:flex; align-items:center; gap:10px}
.takeaways h4 .pk{font-family:var(--disp); font-weight:800; font-size:13px; color:var(--paper-3)}
.takeaways ul{list-style:none; margin:0; padding:0; columns:2; column-gap:30px}
.takeaways li{break-inside:avoid; position:relative; padding:6px 0 6px 22px; font-size:15.5px; color:#E4DAC4; border-bottom:1px solid rgba(247,242,231,.08)}
.takeaways li::before{content:""; position:absolute; left:3px; top:.95em; width:7px; height:7px; background:var(--clay); border-radius:50%}

/* flashcards */
.fc-head{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); margin:38px 0 6px; display:flex; align-items:center; gap:10px}
.fc-head::after{content:""; flex:1; height:1px; background:var(--line)}
.fc-sub{font-size:14.5px; color:var(--ink-2); margin:0 0 18px; font-style:italic}
.fc-grid{display:grid; gap:11px}
.fc{
  perspective:1400px; min-height:84px; cursor:pointer; background:none;
}
.fc-inner{position:relative; width:100%; min-height:84px; transition:transform .5s cubic-bezier(.2,.85,.3,1); transform-style:preserve-3d; text-align:left}
.fc.flip .fc-inner{transform:rotateX(180deg)}
.fc-face{
  position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:var(--rad); padding:16px 18px; display:flex; align-items:center; gap:14px;
  border:1px solid var(--line);
}
.fc-q{background:var(--paper-2)}
.fc-a{background:var(--ink); color:var(--paper-3); transform:rotateX(180deg); border-color:var(--ink)}
.fc-tag{font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:600; padding:4px 7px; border-radius:3px; flex:none; align-self:flex-start; margin-top:2px}
.fc-q .fc-tag{background:var(--ochre-soft); color:var(--clay-deep)}
.fc-a .fc-tag{background:var(--clay); color:var(--paper-3)}
.fc-txt{font-size:15.5px; line-height:1.45}
.fc-q .fc-txt{color:var(--ink); font-weight:500}
.fc-a .fc-txt{color:var(--paper-3)}

/* footer nav */
.r-nav{display:flex; justify-content:space-between; gap:14px; margin-top:46px; padding-top:26px; border-top:1px solid var(--line)}
.r-nav button{
  flex:1; text-align:left; padding:15px 18px; border:1px solid var(--line); border-radius:var(--rad);
  background:var(--paper-2); transition:.16s; box-shadow:var(--shadow);
}
.r-nav button:hover:not(:disabled){border-color:var(--ink); transform:translateY(-2px)}
.r-nav button:disabled{opacity:.32; cursor:default}
.r-nav button.next{text-align:right}
.r-nav .dir{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3)}
.r-nav .nm{font-family:var(--disp); font-weight:600; font-size:15px; color:var(--ink); margin-top:5px; line-height:1.2}

/* mobile */
.scrim{display:none}
@media (max-width:880px){
  .app{grid-template-columns:1fr}
  .strata{position:fixed; top:0; left:0; z-index:60; width:300px; transform:translateX(-100%); transition:transform .28s cubic-bezier(.2,.8,.2,1); box-shadow:0 0 60px -10px rgba(43,34,24,.4)}
  .app.nav-open .strata{transform:translateX(0)}
  .scrim{display:block; position:fixed; inset:0; background:rgba(43,34,24,.42); z-index:50; opacity:0; pointer-events:none; transition:opacity .28s}
  .app.nav-open .scrim{opacity:1; pointer-events:auto}
  .topbar{
    display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:40;
    background:rgba(231,221,200,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:12px 18px;
  }
  .hamb{display:flex; flex-direction:column; gap:4px; padding:5px}
  .hamb i{width:20px; height:2px; background:var(--ink); border-radius:2px}
  .topbar b{font-family:var(--disp); font-weight:800; font-size:17px; letter-spacing:-.02em}
  .topbar .tp-prog{margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--ink-2)}
  .content{padding:30px 22px 100px}
  .takeaways ul{columns:1}
}
@media (max-width:560px){
  body{font-size:16px}
  .content{padding:24px 17px 90px}
  .hero .meta{gap:20px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important; animation:none!important; scroll-behavior:auto!important}
}  /* ---- exam blueprint (domain weightings) ---- */
  .blueprint{margin:0 0 30px}
  .bp-intro{font-size:15px;color:var(--ink-2);max-width:64ch;margin:0 0 20px}
  .bp-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  @media (max-width:760px){.bp-grid{grid-template-columns:1fr;gap:24px}}
  .bp-col{background:var(--paper-3);border:1px solid var(--line);border-radius:14px;padding:20px 22px}
  .bp-col h5{margin:0 0 4px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .bp-col .bp-exam{margin:0 0 16px;font-family:var(--display);font-size:19px;font-weight:600;color:var(--ink)}
  .bp-row{margin:0 0 13px}
  .bp-row:last-child{margin-bottom:0}
  .bp-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:0 0 5px}
  .bp-name{font-size:14px;color:var(--ink);font-weight:500}
  .bp-pct{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink-2);flex:none}
  .bp-track{height:8px;background:var(--paper);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .bp-fill{height:100%;border-radius:6px}
  .bp-c1 .bp-fill{background:linear-gradient(90deg,var(--clay),var(--clay-deep))}
  .bp-c2 .bp-fill{background:linear-gradient(90deg,var(--moss),var(--moss-deep))}
  .bp-note{margin:14px 0 0;font-size:12.5px;color:var(--ink-3);font-style:italic}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="scrim" id="scrim"></div>

  <!-- ============ SIDEBAR / STRATA ============ -->
  <aside class="strata" id="strata">
    <div class="brand">

<script>
const MODULES = [{"id":1,"core":1,"title":"What IT Specialists Do & Troubleshooting Methodology","short":"IT Role & Troubleshooting","blurb":"The job itself, the soft skills that quietly decide most exam questions, and the 6-step methodology you must know in order — plus why each step exists and what breaks when you skip one.","sections":[{"h":"1.1 The Role of an IT Support Specialist","blocks":[{"t":"p","text":"An IT support specialist is the bridge between technology and the people who depend on it. The job is rarely just 'fix the broken thing' — it is keeping an organization's systems usable, secure, and trusted so that everyone else can do their work. Almost every objective on the A+ exam ladders up to this idea."},{"t":"sub","text":"Core responsibilities"},{"t":"list","items":["Supporting users","Maintaining hardware & software","Troubleshooting issues","Securing systems","Documenting work","Communicating clearly"]},{"t":"note","text":"Why this matters in the big picture: a technically perfect fix that the user doesn't understand, or that you never wrote down, creates the next problem. CompTIA frames support as a loop — solve, explain, record — not a one-time repair. The documentation you create today is the knowledge base that lets the next tech (or future you) solve it in minutes."},{"t":"tip","k":"focus","text":"Know the difference between a technical task and a customer-service responsibility — the exam loves to test that line."},{"t":"sub","text":"Technical vs. soft skills"},{"t":"list","items":[{"l":"Technical skills","s":["Hardware repair","OS installation","Networking basics","Security fundamentals","Mobile device support"]},{"l":"Soft skills","s":["Active listening","Empathy","Professional communication","Patience","Documentation"]}]},{"t":"note","text":"Soft-skill questions appear constantly. CompTIA treats 'how you treat the person' as part of the job, not an extra. When a scenario describes an angry or confused user, the right answer is usually the calm, listen-first option — not the fastest technical shortcut. The reason: trust is the product. A user who feels respected reports problems early; one who feels dismissed hides them until they're expensive."}]},{"h":"1.2 Professionalism & Communication","blocks":[{"t":"p","text":"Communication is graded as heavily as competence. The exam models real support desks, where how you behave determines whether the fix actually lands."},{"t":"list","items":["Use clear language and avoid jargon with non-technical users","Maintain a positive, professional attitude even under pressure","Actively listen and don't interrupt or talk over the user","Be culturally sensitive and use appropriate professional titles","Set and meet expectations — give a realistic timeline, then follow up","Avoid distractions (phone, side conversations) while with a customer","Deal with difficult customers by staying calm, not arguing, not minimizing"]},{"t":"note","text":"How this connects: every one of these behaviors exists to preserve information flow. Jargon hides the problem; interrupting loses a clue; missed expectations destroy trust so the user stops cooperating. Professionalism isn't politeness for its own sake — it keeps the troubleshooting data accurate."},{"t":"sub","text":"Handling difficult situations"},{"t":"list","items":["Don't argue or get defensive","Don't dismiss the problem as unimportant","Clarify by restating the issue in your own words","If you can't help, escalate rather than guess","Protect confidential/private material you encounter"]}]},{"h":"1.3 The Troubleshooting Methodology","blocks":[{"t":"p","text":"This is the single most important framework on the entire exam. CompTIA's official methodology has six steps, and questions are written specifically to test that you know the sequence. The order encodes a philosophy: understand before you act, prove before you fix, confirm and record before you walk away."},{"t":"steps","items":["Identify the problem","Establish a theory of probable cause (question the obvious)","Test the theory to determine the cause","Establish a plan of action to resolve the problem and implement the solution","Verify full system functionality and, if applicable, implement preventive measures","Document findings, actions, and outcomes"]},{"t":"note","text":"Some study guides split these into 7 or 8 sub-steps (separating 'escalate' or 'implement' out), but the logic is identical. If the exam asks for a count, the official answer is six. What never changes: identify first, document last."},{"t":"sub","text":"Step 1 — Identify the problem"},{"t":"list","items":["Gather information from the user","Ask open and closed questions","Identify recent changes (the #1 source of new problems)","Reproduce the issue if possible","Back up data before making changes that could risk it"]},{"t":"tip","k":"focus","text":"When a question says 'User reports X,' your first move is always to gather information — never to start replacing parts."},{"t":"note","text":"Why 'recent changes' matters so much: most failures are not random. A driver update, a new cable, a moved device, a policy push — something changed, and working backward from the change is faster than working forward from the symptom."},{"t":"sub","text":"Step 2 — Establish a theory (question the obvious)"},{"t":"list","items":["Start with the most likely / simplest cause","Question the obvious: power, cables, toggles, settings","Consider multiple approaches, internal and external causes"]},{"t":"note","text":"'Question the obvious' is a classic trap on the exam: the scenario buries a trivial cause (unplugged, Wi-Fi off, mute on) under technical noise to see if you'll over-engineer. The big-picture lesson is Occam's razor — the simplest explanation that fits is usually right."},{"t":"sub","text":"Step 3 — Test the theory"},{"t":"list","items":["Try a quick, safe test to confirm or reject","If confirmed, move to a plan","If rejected, establish a new theory — or escalate"]},{"t":"sub","text":"Step 4 — Plan & implement"},{"t":"list","items":["Refer to vendor docs/knowledge base if needed","Minimize downtime and risk","Implement the fix (or the smallest change that resolves it)"]},{"t":"sub","text":"Step 5 — Verify & prevent"},{"t":"list","items":["Confirm the original problem is gone","Test related systems and full functionality","Apply preventive measures so it doesn't recur"]},{"t":"sub","text":"Step 6 — Document"},{"t":"list","items":["What the problem was","What you did to fix it","The outcome and any follow-up"]},{"t":"tip","k":"tip","text":"Documentation is ALWAYS last. If an answer choice documents before verifying, it's wrong."},{"t":"sub","text":"When to escalate"},{"t":"list","items":["You lack the permissions","You lack the right tools","You lack the expertise","The issue is outside your scope or SLA"]}]}],"takeaways":["The 6-step methodology, in exact order — identify first, document last","Soft skills and professional communication are tested as heavily as technical skill","Always gather information and question the obvious before acting","Verify full functionality and add preventive measures before closing","Escalate when you lack permission, tools, expertise, or scope"],"cards":[{"q":"What is step 1 of the CompTIA troubleshooting model?","a":"Identify the problem — gather information, ask questions, check recent changes, and reproduce the issue."},{"q":"How many steps are in CompTIA's official troubleshooting methodology?","a":"Six. (Some guides split them into 7-8 sub-steps, but the official count is six.)"},{"q":"List the six steps in order.","a":"1) Identify the problem 2) Establish a theory 3) Test the theory 4) Plan and implement the solution 5) Verify full functionality and prevent recurrence 6) Document findings."},{"q":"A user reports their PC 'won't turn on.' What's your first move?","a":"Gather information and question the obvious — confirm it's plugged in and powered before assuming hardware failure."},{"q":"What is always the final step of troubleshooting?","a":"Document findings, actions, and outcomes."},{"q":"Your theory was tested and rejected. Now what?","a":"Establish a new theory, or escalate. Don't implement a fix you can't justify."},{"q":"Why is 'identify recent changes' emphasized in step 1?","a":"Most new problems trace to a recent change (update, new hardware, config). Working backward from the change is faster than from the symptom."},{"q":"What does 'question the obvious' mean?","a":"Rule out simple causes first — power, cables, toggles, mute, Wi-Fi off — before pursuing complex theories."},{"q":"When should you back up data during troubleshooting?","a":"Before making any change that could risk the user's data — ideally identified during step 1."},{"q":"What are the four main reasons to escalate?","a":"You lack permissions, lack tools, lack expertise, or the issue is outside your scope/SLA."},{"q":"Why is documentation valuable beyond the current ticket?","a":"It becomes the knowledge base that lets the next technician (or future you) solve the same issue quickly."},{"q":"In step 5, why test related systems and not just the original problem?","a":"A fix can have side effects; verifying full functionality confirms you didn't break something else."},{"q":"What is a 'preventive measure' and when do you apply it?","a":"A change that stops the issue recurring (e.g., a driver update or dust cleaning), applied during step 5 after verifying the fix."},{"q":"A scenario describes an angry user. What's usually the best answer?","a":"Stay calm, listen actively, don't argue or minimize — the respectful, listen-first option."},{"q":"Why does CompTIA treat soft skills as part of the job?","a":"Trust keeps information flowing — respected users report problems early and cooperate; dismissed users hide them."},{"q":"Difference between an open and a closed question?","a":"Open invites detail ('what were you doing when it failed?'); closed confirms a fact ('did you restart it?')."},{"q":"Should you use technical jargon with a non-technical user?","a":"No — use clear, plain language so the user understands; jargon hides the real problem."},{"q":"What does SLA stand for and why does it matter to support?","a":"Service Level Agreement — it defines response/resolution times and scope, shaping when you must act or escalate."},{"q":"You find private/confidential material on a user's machine. What do you do?","a":"Protect its confidentiality — don't view, share, or comment on it beyond what the task requires."},{"q":"Why is interrupting a user a problem during troubleshooting?","a":"You can lose a key clue and damage trust; active listening preserves accurate information."}]},{"id":2,"core":1,"title":"Cables, Connectors & Motherboards","short":"Cables & Motherboards","blurb":"Every connector you'll be quizzed on by sight and speed, and how the motherboard organizes the whole machine into one cooperating system — what each part is for and why the layout exists.","sections":[{"h":"2.1 Why Cables & Connectors Matter","blocks":[{"t":"p","text":"A computer is a collection of separate components that must move data and power between each other reliably. Cables and connectors are the physical roads. The exam tests these heavily because a tech identifies them by sight, matches them to a purpose, and knows their speed limits — picking the wrong cable is a silent, common cause of 'it doesn't work.'"},{"t":"sub","text":"USB — the universal data/power bus"},{"t":"list","items":[{"l":"USB-A","s":["The classic flat rectangle","Host/computer side"]},{"l":"USB-B","s":["Square-ish","Printers and some hubs"]},{"l":"USB-C","s":["Small, oval, reversible","Carries data, video (DisplayPort Alt Mode), and up to 100W+ power"]},{"l":"Micro/Mini USB","s":["Older small-device connectors","Being replaced by USB-C"]}]},{"t":"note","text":"Big picture: USB-C is a connector shape, not a speed or feature guarantee. The same plug might carry USB 2.0 or Thunderbolt 4 — capability depends on the controller behind the port. This is why two identical-looking USB-C cables can behave completely differently."},{"t":"sub","text":"USB standards & speeds"},{"t":"table","head":["Standard","Speed","Note"],"rows":[["USB 2.0","480 Mbps","Black port"],["USB 3.0 / 3.1 Gen 1","5 Gbps","Blue port"],["USB 3.1 Gen 2","10 Gbps","Often teal"],["USB 3.2 Gen 2x2","20 Gbps","USB-C only"],["Thunderbolt 3/4","40 Gbps","USB-C shape, adds PCIe + DisplayPort"]]},{"t":"tip","k":"focus","text":"Memorize the colors: black = 2.0, blue = 3.0, teal = 3.1 Gen 2. Color is the fastest visual clue on the exam."},{"t":"sub","text":"Video interfaces"},{"t":"table","head":["Interface","Carries audio?","Note"],"rows":[["VGA","No","Analog, blue, 15-pin — legacy"],["DVI","No (mostly)","Digital/analog; DVI-D digital, DVI-I both"],["HDMI","Yes","Consumer standard; audio + video"],["DisplayPort","Yes","PC standard; can daisy-chain monitors"]]},{"t":"note","text":"How they connect to the big picture: HDMI and DisplayPort both carry audio and video over one cable, which is why modern displays need only a single connection. VGA and DVI are analog-era holdovers you'll mostly see on adapters and older equipment."},{"t":"sub","text":"Storage & power connectors"},{"t":"list","items":[{"l":"SATA data","s":["Thin 7-pin L-shaped","Connects drives to the board"]},{"l":"SATA power","s":["15-pin from the PSU"]},{"l":"Molex","s":["Older 4-pin power for drives/fans"]},{"l":"24-pin ATX","s":["Main motherboard power"]},{"l":"8-pin EPS / 4+4","s":["CPU power"]},{"l":"6/8-pin PCIe","s":["Graphics card power"]}]}]},{"h":"2.2 The Motherboard — the System's Backbone","blocks":[{"t":"p","text":"The motherboard is the central nervous system: every other component plugs into it, and it routes data and power between them via the chipset and buses. Understanding the board is understanding how a PC is organized."},{"t":"sub","text":"What lives on the board"},{"t":"list","items":[{"l":"CPU socket","s":["LGA (pins on board, Intel)","PGA (pins on CPU, older AMD)","AM4/AM5, LGA1700 etc."]},{"l":"RAM slots (DIMM)","s":["Dual-channel pairs","Match the generation: DDR4 vs DDR5 are keyed differently"]},{"l":"Chipset","s":["Northbridge/southbridge functions","Routes between CPU, RAM, and peripherals"]},{"l":"CMOS battery","s":["CR2032 coin cell","Keeps BIOS settings + clock when powered off"]},{"l":"Power connectors","s":["24-pin main, 8-pin CPU"]},{"l":"Front-panel headers","s":["Power button, LEDs, USB, audio"]}]},{"t":"note","text":"Why the chipset matters: it decides what the board supports — how many USB ports, PCIe lanes, M.2 slots, and which CPUs fit. Two boards with the same socket but different chipsets can have very different capabilities. The chipset is the 'traffic controller' between the fast CPU/RAM and slower peripherals."},{"t":"sub","text":"Expansion slots (PCIe)"},{"t":"table","head":["Slot","Lanes","Typical use"],"rows":[["PCIe x16","16","Graphics cards"],["PCIe x8","8","High-speed cards"],["PCIe x4","4","NVMe adapters, capture cards"],["PCIe x1","1","Sound, network, small cards"]],"caption":""},{"t":"note","text":"PCIe is backward/forward compatible in slot size — a shorter card works in a longer slot. More lanes = more bandwidth. This is why the GPU gets the x16 slot: it's the most data-hungry component."},{"t":"sub","text":"Form factors"},{"t":"table","head":["Form factor","Size","Use"],"rows":[["ATX","Largest standard","Full towers, most expansion"],["microATX","Smaller","Mainstream/budget builds"],["Mini-ITX","Smallest","Small-form-factor PCs"]]},{"t":"note","text":"Form factor connects physical size to capability: bigger boards fit more slots and RAM but need bigger cases. The form factor must match the case and the power supply layout."},{"t":"sub","text":"ESD & electrical safety"},{"t":"list","items":["Use an anti-static wrist strap bonded to the chassis","Store parts in anti-static bags","Avoid carpet and low humidity","Unplug and use the power button to drain residual charge","Never wear a wrist strap when working on CRTs or power supplies (stored high voltage)"]},{"t":"tip","k":"focus","text":"ESD can damage components silently — a part may fail later, not immediately. That's why prevention (straps, bags, mats) is the whole strategy."}]},{"h":"2.3 Installation & Legacy","blocks":[{"t":"sub","text":"Mounting the board"},{"t":"list","items":["Install standoffs first to raise the board off the case (prevents shorts)","Align the I/O shield","Don't overtighten screws","Connect 24-pin and CPU power before first boot"]},{"t":"note","text":"Standoffs aren't optional hardware — they create an air gap so the metal solder points underneath don't touch the metal case and short out. A missing or extra standoff in the wrong spot is a classic 'won't POST' cause."},{"t":"sub","text":"Legacy cables & adapters"},{"t":"list","items":["PATA/IDE — wide 40-pin ribbon, old drives","Molex-to-SATA power adapters","VGA-to-HDMI / DVI-to-HDMI active adapters","PS/2 — round keyboard/mouse connectors (purple/green)"]}]}],"takeaways":["Identify USB/video/storage connectors by sight, and USB by port color","USB-C is a shape; its speed depends on the controller (USB 2.0 up to Thunderbolt 4)","The motherboard routes data/power; the chipset decides what's supported","PCIe x16 is for the GPU; more lanes = more bandwidth; slots are size-compatible","Standoffs and ESD precautions prevent silent, hard-to-diagnose failures"],"cards":[{"q":"A blue USB port indicates which standard?","a":"USB 3.0 / 3.1 Gen 1 — 5 Gbps."},{"q":"What does a black USB port usually indicate?","a":"USB 2.0 — 480 Mbps."},{"q":"What color often marks a USB 3.1 Gen 2 (10 Gbps) port?","a":"Teal."},{"q":"Is USB-C a speed or a connector shape?","a":"A connector shape. Its actual speed depends on the controller behind it — anywhere from USB 2.0 to Thunderbolt 4."},{"q":"What's the max speed of Thunderbolt 3/4?","a":"40 Gbps. It uses the USB-C shape and also carries PCIe and DisplayPort."},{"q":"How much power can USB-C deliver with Power Delivery?","a":"Up to 100W+ (newer revisions higher), enough to charge laptops."},{"q":"Which USB connector is square-ish and used for printers?","a":"USB-B."},{"q":"How do you tell DisplayPort from HDMI at a glance?","a":"DisplayPort has one notched/angled corner; HDMI is symmetrical and trapezoidal."},{"q":"Which two common video interfaces carry audio and video together?","a":"HDMI and DisplayPort."},{"q":"What is VGA and why is it legacy?","a":"A 15-pin analog video connector (blue). It's analog-only, lower quality, and superseded by digital HDMI/DisplayPort."},{"q":"DVI-I vs DVI-D?","a":"DVI-I carries both digital and analog signals; DVI-D is digital-only."},{"q":"Which DisplayPort feature lets you chain multiple monitors from one port?","a":"Multi-Stream Transport (daisy-chaining)."},{"q":"What does USB-C 'DisplayPort Alt Mode' do?","a":"Lets a USB-C port output native DisplayPort video, so one cable carries data and video."},{"q":"Describe a SATA data connector.","a":"A thin, flat, L-shaped 7-pin connector linking drives to the motherboard."},{"q":"How many pins is a SATA power connector?","a":"15 pins, supplied from the PSU."},{"q":"What is a Molex connector used for?","a":"Older 4-pin power for drives, fans, and accessories."},{"q":"Which connector supplies main motherboard power?","a":"The 24-pin ATX connector."},{"q":"Which connector supplies CPU power?","a":"The 8-pin (or 4+4) EPS connector."},{"q":"Which connectors power a graphics card?","a":"6-pin and/or 8-pin PCIe power connectors (or 12VHPWR on newest GPUs)."},{"q":"Which is faster: a SATA SSD or an NVMe SSD?","a":"NVMe — it runs over PCIe lanes, far faster than the SATA bus (~600 MB/s cap)."}]},{"id":3,"core":1,"title":"Installing System Devices","short":"Installing Devices","blurb":"Powering, cooling, storing, remembering, and computing — the core subsystems, how to install each safely, and how they balance against one another so the whole machine stays stable.","sections":[{"h":"3.1 Power Supplies & Cooling","blocks":[{"t":"p","text":"The power supply unit (PSU) converts wall AC into the low-voltage DC the components need (+3.3V, +5V, +12V). It's the heart that feeds everything — undersized or failing power causes random, hard-to-diagnose crashes, so sizing and quality matter more than people expect."},{"t":"sub","text":"Sizing & efficiency"},{"t":"list","items":["Add up component draw (GPU and CPU dominate)","Leave 20-30% headroom for spikes and future upgrades","80 PLUS ratings (Bronze→Titanium) certify efficiency, not wattage","Modular PSUs let you attach only the cables you need"]},{"t":"note","text":"Why headroom matters: a PSU running near 100% load runs hot, ages fast, and browns out under spikes (e.g., a GPU power transient), causing reboots that look like software bugs. Headroom is reliability insurance, not waste."},{"t":"sub","text":"Cooling"},{"t":"list","items":[{"l":"Air cooling","s":["Heatsink + fan","Quiet, cheap, reliable"]},{"l":"Liquid cooling","s":["Pump, radiator, fans","Better for high-heat CPUs"]},{"l":"Case airflow","s":["Intake front/bottom, exhaust rear/top","Positive pressure reduces dust"]},{"l":"Thermal paste","s":["Fills microscopic gaps between CPU and cooler","A thin layer transfers heat; too much insulates"]}]},{"t":"tip","k":"focus","text":"Thermal throttling, random shutdowns, and loud fans usually mean a heat problem — check paste, fans, and airflow before blaming the CPU."}]},{"h":"3.2 Storage Devices","blocks":[{"t":"p","text":"Storage holds data permanently (unlike RAM). The exam wants you to compare types by speed, durability, and cost, and to know RAID — combining drives for speed or fault tolerance."},{"t":"table","head":["Type","Speed","Note"],"rows":[["HDD","Slowest","Spinning platters; cheap, high capacity"],["SATA SSD","~550 MB/s","No moving parts; SATA bus limited"],["NVMe SSD (M.2)","Up to several GB/s","PCIe lanes; fastest mainstream storage"]]},{"t":"note","text":"How they connect to the big picture: HDDs store cheaply but bottleneck the whole system; SSDs make a PC feel fast because storage is the slowest link in everyday tasks. NVMe removes the SATA ceiling by riding PCIe directly."},{"t":"sub","text":"RAID levels"},{"t":"table","head":["RAID","Needs","Gives","Fault tolerance"],"rows":[["0","2+ drives","Speed (striping)","NONE — one drive lost = all lost"],["1","2 drives","Mirroring","1 drive can fail"],["5","3+ drives","Striping + 1 parity","1 drive can fail"],["6","4+ drives","Striping + 2 parity","2 drives can fail"],["10","4+ drives","Mirror + stripe","1 per mirror set"]]},{"t":"note","text":"RAID is about trade-offs: RAID 0 buys speed by sacrificing all safety; RAID 1 buys safety by halving usable space; RAID 5/6 balance both using parity (math that reconstructs a lost drive). RAID is NOT a backup — it protects against drive failure, not deletion, corruption, or ransomware."},{"t":"tip","k":"focus","text":"RAID 5 survives one drive failure; RAID 6 survives two. That single-fact contrast is a frequent exam question."}]},{"h":"3.3 System Memory (RAM)","blocks":[{"t":"p","text":"RAM is fast, volatile working memory — it holds what the CPU is actively using and is wiped on power-off. More RAM lets a system juggle more at once; too little forces slow disk paging."},{"t":"list","items":[{"l":"Form factors","s":["DIMM — desktops","SO-DIMM — laptops/small PCs"]},{"l":"Generations","s":["DDR3, DDR4, DDR5 — not interchangeable","Each is keyed differently"]},{"l":"Channels","s":["Single / dual / quad","Matched pairs widen the bus"]},{"l":"ECC","s":["Error-correcting; servers/workstations","Detects and fixes memory errors"]}]},{"t":"note","text":"Why generation matters: DDR4 and DDR5 differ in voltage, pin layout, and speed, so a board supports only one. Mixing or mismatching causes no-boot. The notch position physically blocks the wrong stick — a built-in safeguard."},{"t":"tip","k":"tip","text":"Random crashes, failed boots, and memory errors in diagnostics point to bad RAM — test with one stick at a time or a memory tester."}]},{"h":"3.4 CPUs","blocks":[{"t":"p","text":"The CPU is the brain — it executes instructions. Performance comes from clock speed, core/thread count, cache, and architecture. It must match the socket and be kept cool."},{"t":"list","items":[{"l":"Cores & threads","s":["More cores = more parallel work","Hyper-Threading/SMT = 2 threads per core"]},{"l":"Cache","s":["Tiny ultra-fast memory (L1/L2/L3)","Reduces trips to slower RAM"]},{"l":"Clock speed","s":["GHz = cycles per second","Boost clocks raise it temporarily"]},{"l":"TDP","s":["Thermal Design Power (watts of heat)","Sizes the cooler you need"]}]},{"t":"note","text":"How it ties together: a fast CPU starved of cooling throttles; starved of RAM it waits on paging; starved of power it crashes. Building well means balancing CPU, cooling, RAM, and PSU — no single part wins alone."},{"t":"sub","text":"Installing a CPU"},{"t":"list","items":["Match the socket exactly (LGA1700, AM5, etc.)","Align the triangle/notch — never force it","Apply a thin thermal paste layer","Seat the cooler evenly and connect its fan header"]},{"t":"tip","k":"focus","text":"Bent socket pins (LGA) or a forced CPU = no POST. Alignment and zero force are everything."}]}],"takeaways":["Size a PSU with 20-30% headroom; 80 PLUS rates efficiency, not wattage","Storage speed: HDD < SATA SSD < NVMe; storage is usually the slowest link","RAID 0 = speed/no safety, 1 = mirror, 5 = 1-drive parity, 6 = 2-drive parity, 10 = mirror+stripe — RAID is not backup","RAM is volatile; match the DDR generation; mismatches cause no-boot","CPU performance balances cores, cache, clock, and cooling — match the socket and never force it"],"cards":[{"q":"What does a power supply actually do?","a":"Converts wall AC into the low-voltage DC rails (+3.3V, +5V, +12V) the components use."},{"q":"Why leave 20-30% wattage headroom on a PSU?","a":"To handle power spikes, run cooler/longer, and allow upgrades — running near 100% causes heat and brownout reboots."},{"q":"What does an 80 PLUS rating certify?","a":"Power efficiency (how little energy is wasted as heat), not the wattage or quality tier directly."},{"q":"Modular vs non-modular PSU?","a":"Modular lets you attach only the cables you need (cleaner airflow); non-modular has all cables permanently attached."},{"q":"Random reboots under gaming load with adequate temps. PSU-related cause?","a":"An undersized or failing PSU browning out during GPU/CPU power spikes."},{"q":"What does thermal paste do, and what happens with too much?","a":"It fills microscopic gaps so heat transfers from CPU to cooler; too much insulates and traps heat."},{"q":"Air vs liquid CPU cooling — when liquid?","a":"Liquid (AIO) handles higher heat output and overclocked/high-TDP CPUs more quietly under load."},{"q":"What is positive case pressure and why want it?","a":"More intake than exhaust airflow; it reduces dust intake through unfiltered gaps."},{"q":"Symptoms that point to a cooling problem?","a":"Thermal throttling, random shutdowns, very loud fans, high idle temps."},{"q":"Order storage types by speed, slowest to fastest.","a":"HDD < SATA SSD < NVMe (M.2) SSD."},{"q":"Why does an SSD make a PC 'feel' faster than a faster CPU might?","a":"Storage is usually the slowest everyday bottleneck; removing it speeds boots, loads, and app launches."},{"q":"Why is NVMe faster than a SATA SSD?","a":"NVMe runs over PCIe lanes directly, bypassing the ~550 MB/s SATA bus ceiling."},{"q":"What does RAID 0 provide and risk?","a":"Striping for speed and full capacity, but zero fault tolerance — one drive lost loses everything."},{"q":"What does RAID 1 do?","a":"Mirrors data across two drives; one can fail with no data loss, but usable capacity is halved."},{"q":"RAID 5 vs RAID 6 fault tolerance?","a":"RAID 5 survives one drive failure (single parity); RAID 6 survives two (double parity)."},{"q":"Minimum drives for RAID 5 and RAID 6?","a":"RAID 5 needs 3+; RAID 6 needs 4+."},{"q":"What is RAID 10?","a":"A mirror of striped sets (1+0) — combines speed and redundancy; needs 4+ drives."},{"q":"Why is RAID NOT a backup?","a":"It protects against drive hardware failure, not deletion, corruption, ransomware, or disaster — those need real backups."},{"q":"What is parity in RAID 5/6?","a":"Calculated data that lets the array rebuild a failed drive's contents mathematically."},{"q":"HDD performance is described by what spec?","a":"Rotational speed (RPM) — e.g., 5400 vs 7200 — plus cache and interface."}]},{"id":4,"core":1,"title":"PC Hardware Troubleshooting","short":"Hardware Troubleshooting","blurb":"Diagnosing BIOS/UEFI, power, boot, storage, and display failures — high-frequency, symptom-driven material. The skill here is reading what a symptom is really telling you about which subsystem failed.","sections":[{"h":"4.1 BIOS & UEFI — the firmware that starts everything","blocks":[{"t":"p","text":"Before any operating system loads, firmware on the motherboard wakes the hardware, checks it, and finds something to boot. Older systems use BIOS; modern ones use UEFI. Understanding this layer explains a whole class of 'it won't even start' problems that have nothing to do with Windows."},{"t":"list","items":[{"l":"POST (Power-On Self-Test)","s":["Quick hardware check at startup","Beep codes or on-screen codes report failures"]},{"l":"BIOS","s":["Legacy firmware","16-bit, MBR disks, smaller boot drives"]},{"l":"UEFI","s":["Modern replacement","GPT disks, Secure Boot, large drives, mouse-driven setup"]},{"l":"CMOS/RTC","s":["Stores settings + clock","Backed by the coin battery"]}]},{"t":"note","text":"Why UEFI matters in the big picture: it enables Secure Boot (blocking unsigned/boot-level malware), supports drives larger than 2 TB via GPT, and boots faster. When a system 'forgets' its settings or the clock resets, suspect the CMOS battery — the firmware's memory lost power."},{"t":"tip","k":"focus","text":"No video at all + beep codes = POST failure. The beep/code pattern points to the failed subsystem (RAM, GPU, etc.)."}]},{"h":"4.2 Power, Boot & Disk Failures","blocks":[{"t":"p","text":"Most 'dead PC' calls fall into a few buckets. Working from the outside in — power, then POST, then boot device, then OS — keeps you from replacing expensive parts to fix a cheap problem."},{"t":"sub","text":"Power symptoms"},{"t":"list","items":["No lights/fans at all → power source, PSU, or front-panel cable","Fans spin but no POST → RAM, CPU, GPU, or board","Powers on then off in a loop → overheating, short, or failing PSU"]},{"t":"sub","text":"Boot & disk symptoms"},{"t":"list","items":["'No boot device / Operating system not found' → boot order, disconnected/dead drive, corrupt boot record","Clicking/grinding HDD → imminent mechanical failure; back up now","S.M.A.R.T. error → drive predicts its own failure","Slow performance + bad sectors → aging drive"]},{"t":"note","text":"How it connects: storage failures are the most dangerous because they threaten data, not just function. A clicking drive or S.M.A.R.T. warning is a countdown — the correct first action is to back up immediately, before any repair attempt."},{"t":"tip","k":"focus","text":"'Operating system not found' with a healthy drive often means the boot order changed or a USB stick is plugged in — question the obvious before reinstalling."}]},{"h":"4.3 System & Display Failures","blocks":[{"t":"sub","text":"Overheating & shutdowns"},{"t":"list","items":["Random shutdowns/throttling → dust, dead fan, dried thermal paste","Burning smell → stop immediately; possible PSU/component failure","Continuous reboots → bad RAM, overheating, or failing PSU"]},{"t":"sub","text":"Display problems"},{"t":"list","items":["No image but PC runs → cable/input, GPU seating, or monitor","Artifacts/strange colors → overheating or failing GPU","Dim display (laptop) → backlight/inverter or brightness setting","Flickering → cable, refresh rate, or driver"]},{"t":"note","text":"The diagnostic logic: separate 'is it the PC, the cable, or the display?' by swapping one variable at a time. A second monitor or cable instantly tells you which side the fault is on — this is 'test the theory' in action."},{"t":"sub","text":"Useful tools"},{"t":"list","items":["Multimeter / PSU tester — verify voltages","POST card / beep codes — pinpoint POST failures","Known-good spare parts — swap to isolate","Manufacturer diagnostics — drives, memory"]}]}],"takeaways":["POST runs before the OS; beep/codes identify the failed subsystem","UEFI adds Secure Boot, GPT (>2TB), and faster boot over legacy BIOS","A clicking drive or S.M.A.R.T. error means back up immediately","Work outside-in: power → POST → boot device → OS","Isolate display faults by swapping one variable (cable, monitor, GPU) at a time"],"cards":[{"q":"What is POST and when does it run?","a":"Power-On Self-Test — a quick hardware check the firmware runs at startup before loading the OS."},{"q":"You get beep codes and no video. What does that indicate?","a":"A POST failure; the beep pattern identifies the failed subsystem (often RAM or GPU)."},{"q":"Three advantages of UEFI over legacy BIOS?","a":"Secure Boot, support for GPT disks larger than 2 TB, and faster boot (plus a graphical, mouse-driven setup)."},{"q":"The system clock resets and BIOS settings are lost each boot. Cause?","a":"A dead CMOS/RTC coin battery — the firmware lost its saved settings."},{"q":"What does Secure Boot protect against?","a":"Unsigned or boot-level malware (rootkits/bootkits) by only allowing trusted, signed boot loaders."},{"q":"No lights or fans at all. Where do you start?","a":"The power source and PSU — outlet, switch, cable, and front-panel power connector — before internal parts."},{"q":"Fans spin but the system won't POST. Likely culprits?","a":"RAM, CPU, GPU, or motherboard — reseat RAM/GPU and check for beep codes."},{"q":"PC powers on then shuts off in a loop. Common causes?","a":"Overheating, a short (e.g., standoff), or a failing PSU."},{"q":"'Operating system not found' on a known-good drive. First checks?","a":"Boot order and any plugged-in USB media; then the drive's connection and boot record — before reinstalling."},{"q":"A hard drive is clicking or grinding. Correct first action?","a":"Back up the data immediately — it signals imminent mechanical failure."},{"q":"What is a S.M.A.R.T. error telling you?","a":"The drive's self-monitoring predicts failure; treat it as a warning to back up and replace the drive."},{"q":"Why are storage failures the most urgent to act on?","a":"They threaten data, not just functionality; data loss can be permanent."},{"q":"Random shutdowns and throttling with no software cause. Suspect?","a":"Heat — dust buildup, a failed fan, or dried-out thermal paste."},{"q":"You smell burning from a PC. What do you do?","a":"Power off and unplug immediately; inspect for failed PSU/components before powering on again."},{"q":"Continuous reboots (no BSOD). Likely hardware causes?","a":"Bad RAM, overheating, or a failing power supply."},{"q":"The PC runs but there's no image on screen. How do you isolate it?","a":"Swap one variable at a time — cable, input source, monitor, then GPU seating — to find the faulty side."},{"q":"Screen artifacts or strange colors. Likely cause?","a":"An overheating or failing GPU (or a bad cable/driver)."},{"q":"A laptop screen is very dim but shows an image. Cause?","a":"Backlight/brightness issue (or inverter on older panels) — the panel works, the lighting doesn't."},{"q":"Which tool verifies PSU output voltages?","a":"A multimeter or a dedicated PSU tester."},{"q":"Why keep known-good spare parts when troubleshooting?","a":"Swapping in a known-good part isolates the fault by elimination — the core of 'test the theory.'"},{"q":"What does the outside-in diagnostic order prevent?","a":"Replacing expensive parts (CPU/board) to fix a cheap problem (cable/power/boot order)."}]},{"id":5,"core":1,"title":"Comparing Local Networking Hardware","short":"Networking Hardware","blurb":"Network types, the devices that move frames, the cabling that carries them, and the Wi-Fi standards on top — and how each piece decides where data is allowed to go.","sections":[{"h":"5.1 Network Types & the Devices That Connect Them","blocks":[{"t":"p","text":"A network is just devices sharing a path to communicate. They're named by scale, and the hardware between them decides how far traffic travels and how intelligently it's directed. Knowing which device makes which decision is the heart of this module."},{"t":"table","head":["Type","Scope"],"rows":[["PAN","Personal — Bluetooth range"],["LAN","Local — one building/office"],["WLAN","Wireless LAN — Wi-Fi"],["MAN","Metropolitan — city-wide"],["WAN","Wide — across cities/countries (the internet is the largest WAN)"]]},{"t":"sub","text":"Connecting devices"},{"t":"table","head":["Device","Works at","What it decides"],"rows":[["Hub","Layer 1","Nothing — repeats to all ports (legacy, dumb)"],["Switch","Layer 2","Sends frames only to the right port by MAC address"],["Router","Layer 3","Moves traffic between networks by IP address"],["Access Point","Layer 2","Bridges wireless clients onto the wired LAN"]]},{"t":"note","text":"How they connect to the big picture: a switch keeps local traffic efficient (only the intended device hears it), while a router is the gateway that decides what leaves your network for the internet. A hub is the obsolete ancestor that blasted everything everywhere — switches replaced it because they're smarter and more secure."},{"t":"tip","k":"focus","text":"Switch = MAC addresses, within a network (Layer 2). Router = IP addresses, between networks (Layer 3). That distinction is tested constantly."}]},{"h":"5.2 Cabling — the physical medium","blocks":[{"t":"sub","text":"Twisted pair (copper)"},{"t":"table","head":["Category","Speed","Note"],"rows":[["Cat5e","1 Gbps","Common minimum"],["Cat6","1-10 Gbps","10G to ~55m"],["Cat6a","10 Gbps","10G to 100m"],["Cat7/8","10-40 Gbps","Shielded, data center"]]},{"t":"list","items":[{"l":"UTP vs STP","s":["UTP = unshielded (cheaper, common)","STP = shielded against interference"]},{"l":"Connector","s":["RJ45 for Ethernet","RJ11 for phone"]},{"l":"Standards","s":["T568A / T568B wiring","Straight-through vs crossover"]}]},{"t":"sub","text":"Fiber & coax"},{"t":"list","items":[{"l":"Fiber optic","s":["Light over glass","Immune to EMI, long distance, high speed","Single-mode (long haul) vs multi-mode (shorter)"]},{"l":"Coaxial","s":["Cable internet/TV","F-type connector"]}]},{"t":"note","text":"Why fiber exists: copper signals weaken and pick up interference over distance; light in glass doesn't. Fiber is the choice for backbones, long runs, and anywhere electrical noise or distance would corrupt copper. The trade-off is cost and fragility."},{"t":"tip","k":"tip","text":"Copper Ethernet maxes at ~100m per run. Need longer or interference-proof? Use fiber."}]},{"h":"5.3 Wireless (Wi-Fi)","blocks":[{"t":"table","head":["Standard","Wi-Fi name","Band"],"rows":[["802.11n","Wi-Fi 4","2.4 & 5 GHz"],["802.11ac","Wi-Fi 5","5 GHz"],["802.11ax","Wi-Fi 6/6E","2.4/5/6 GHz"]]},{"t":"note","text":"The band trade-off: 2.4 GHz travels farther and through walls but is slower and crowded; 5/6 GHz is much faster but shorter range. This is why a router offers both — devices pick the band that fits their distance and speed needs."},{"t":"list","items":["Channels: on 2.4 GHz use 1, 6, or 11 to avoid overlap","Interference: microwaves, cordless phones, neighbors","Placement: central, elevated, away from metal/appliances"]},{"t":"tip","k":"focus","text":"2.4 GHz = range, 5/6 GHz = speed. Match the band to the problem (dead zone vs slow throughput)."}]}],"takeaways":["Networks are named by scale: PAN, LAN, WLAN, MAN, WAN","Switch = Layer 2/MAC within a network; Router = Layer 3/IP between networks","Copper Ethernet runs ~100m; fiber goes far and resists interference","Cat5e=1G, Cat6=up to 10G short, Cat6a=10G/100m","2.4 GHz gives range, 5/6 GHz gives speed; use channels 1/6/11 on 2.4 GHz"],"cards":[{"q":"Order these by scale: WAN, PAN, LAN, MAN.","a":"PAN (personal) < LAN (local) < MAN (metropolitan) < WAN (wide)."},{"q":"What is a WLAN?","a":"A wireless LAN — a local network using Wi-Fi instead of cables."},{"q":"At what layer does a switch operate and what does it use?","a":"Layer 2 — it forwards frames using MAC addresses."},{"q":"At what layer does a router operate and what does it use?","a":"Layer 3 — it routes between networks using IP addresses."},{"q":"What's the difference between a switch and a hub?","a":"A switch sends frames only to the correct port (by MAC); a hub blindly repeats to all ports (legacy, inefficient)."},{"q":"What does an access point do?","a":"Bridges wireless clients onto the wired LAN (Layer 2)."},{"q":"Which device is your gateway to the internet?","a":"The router — it decides what traffic leaves your network for other networks."},{"q":"Why did switches replace hubs?","a":"Switches are smarter and more secure — they direct traffic to the intended device instead of broadcasting to all."},{"q":"What speed and distance does Cat6 support for 10G?","a":"Up to 10 Gbps but only to ~55 meters (Cat6a does 10G to 100m)."},{"q":"What's the max length of a copper Ethernet run?","a":"About 100 meters per run; beyond that, use fiber or add networking equipment."},{"q":"UTP vs STP cable?","a":"UTP is unshielded (cheaper, common); STP is shielded against electromagnetic interference."},{"q":"Which connector does Ethernet use vs telephone?","a":"RJ45 for Ethernet; RJ11 for telephone."},{"q":"When do you use a crossover cable conceptually?","a":"To connect two like devices directly (legacy); modern auto-MDIX makes straight-through work in most cases."},{"q":"Why use fiber optic over copper?","a":"It's immune to EMI, carries data far longer distances, and reaches very high speeds — light in glass doesn't degrade like copper."},{"q":"Single-mode vs multi-mode fiber?","a":"Single-mode is for long-haul distances; multi-mode is for shorter runs (e.g., within a building/campus)."},{"q":"What cable type carries cable-internet/TV and what connector?","a":"Coaxial, using an F-type connector."},{"q":"Which Wi-Fi standard is Wi-Fi 6/6E and which bands?","a":"802.11ax — operates on 2.4, 5, and (6E) 6 GHz."},{"q":"2.4 GHz vs 5 GHz trade-off?","a":"2.4 GHz has longer range and better wall penetration but is slower/crowded; 5 GHz is faster but shorter range."},{"q":"Which non-overlapping channels should you use on 2.4 GHz?","a":"Channels 1, 6, and 11."},{"q":"A user has a Wi-Fi dead zone far from the router. Which band/fix?","a":"Favor 2.4 GHz for range, reposition the AP centrally/elevated, or add an access point/extender."},{"q":"A user near the router wants maximum speed. Which band?","a":"5 or 6 GHz — faster throughput at short range."}]},{"id":6,"core":1,"title":"Configuring Network Addressing & Internet Connections","short":"Addressing & Internet","blurb":"How devices get on the internet, and how IP addressing, DHCP, DNS, and common ports actually work together to turn a name you type into a connection that reaches the right machine.","sections":[{"h":"6.1 Internet Connection Types","blocks":[{"t":"p","text":"Every connection type is a different road to the same internet. The exam wants you to compare them by speed, distance, and where they make sense — fiber in a city, satellite in the remote countryside."},{"t":"table","head":["Type","Note"],"rows":[["Fiber","Fastest, low latency"],["Cable","Fast, shared neighborhood bandwidth"],["DSL","Over phone lines; speed drops with distance"],["Cellular (4G/5G)","Mobile/wireless broadband"],["Satellite","Reaches remote areas; higher latency"],["Fixed wireless","Line-of-sight to a tower"]]},{"t":"note","text":"How this connects: there's no single 'best' — each trades speed against reach and cost. Satellite has high latency because the signal travels to orbit and back, which is why it's a last resort where wired options don't exist."}]},{"h":"6.2 TCP/IP — addresses, DHCP, DNS","blocks":[{"t":"p","text":"TCP/IP is the language of the internet. An IP address identifies a device; DHCP hands those addresses out automatically; DNS translates human names into IP addresses. Together they're the plumbing behind every connection."},{"t":"sub","text":"IP addressing"},{"t":"list","items":[{"l":"IPv4","s":["32-bit, e.g. 192.168.1.10","Running out of addresses"]},{"l":"IPv6","s":["128-bit, vast space","e.g. 2001:db8::1"]},{"l":"Private ranges","s":["10.0.0.0/8","172.16-31.0.0","192.168.0.0/16"]},{"l":"APIPA","s":["169.254.x.x","Self-assigned when DHCP fails"]}]},{"t":"note","text":"Why APIPA is a clue, not a fix: a 169.254.x.x address means the device asked for an IP and got no answer from DHCP. It's the network equivalent of 'I shouted and nobody replied,' so you check the DHCP server/router connection."},{"t":"sub","text":"The helpers"},{"t":"list","items":[{"l":"DHCP","s":["Auto-assigns IP, subnet, gateway, DNS","The DORA process: Discover, Offer, Request, Acknowledge"]},{"l":"DNS","s":["Resolves names (google.com) to IPs","'The internet's phone book'"]},{"l":"Subnet mask","s":["Separates network vs host portion of an IP"]},{"l":"Default gateway","s":["The router IP traffic uses to leave the network"]}]},{"t":"tip","k":"focus","text":"Can reach sites by IP but not by name? DNS is the problem. Got a 169.254 address? DHCP is the problem."}]},{"h":"6.3 Ports & Protocols","blocks":[{"t":"p","text":"Ports are numbered doors on a device; protocols are the languages spoken through them. Memorizing the common port numbers is classic A+ rote — they identify what kind of traffic is flowing."},{"t":"table","head":["Port","Protocol","Purpose"],"rows":[["80","HTTP","Web (unencrypted)"],["443","HTTPS","Web (encrypted)"],["22","SSH","Secure remote shell"],["3389","RDP","Remote Desktop"],["53","DNS","Name resolution"],["25/587","SMTP","Sending email"],["143/993","IMAP","Receiving email (synced)"],["110/995","POP3","Receiving email (download)"],["445","SMB","Windows file sharing"],["67/68","DHCP","Address assignment"]]},{"t":"note","text":"IMAP vs POP3 is a favorite: IMAP keeps mail on the server and syncs across all devices; POP3 downloads to one device and (by default) removes it from the server. Choose IMAP for multi-device users — which is almost everyone today."},{"t":"tip","k":"focus","text":"Know the secure/insecure pairs: HTTP 80 vs HTTPS 443. The encrypted version is what you should prefer."}]}],"takeaways":["Connection types trade speed for reach/cost; satellite = remote but high latency","IP identifies a device, DHCP assigns it, DNS resolves names to IPs","169.254.x.x (APIPA) means DHCP failed; reachable by IP but not name means DNS failed","DHCP follows DORA: Discover, Offer, Request, Acknowledge","Know common ports: 80/443, 22, 3389, 53, 25/587, 143/110, 445"],"cards":[{"q":"Which connection type has the highest speed and lowest latency?","a":"Fiber optic."},{"q":"Why does satellite internet have high latency?","a":"The signal travels up to orbit and back, adding distance/delay — it's used where wired options aren't available."},{"q":"How does DSL's speed relate to distance?","a":"It runs over phone lines and slows the farther you are from the provider's equipment."},{"q":"IPv4 vs IPv6 address size?","a":"IPv4 is 32-bit (running out); IPv6 is 128-bit (vast address space)."},{"q":"Name the three private IPv4 ranges.","a":"10.0.0.0/8, 172.16.0.0–172.31.255.255, and 192.168.0.0/16."},{"q":"What does a 169.254.x.x address mean?","a":"APIPA — the device self-assigned because it couldn't reach a DHCP server."},{"q":"What does DHCP automatically assign?","a":"IP address, subnet mask, default gateway, and DNS server."},{"q":"What are the four steps of DHCP?","a":"DORA — Discover, Offer, Request, Acknowledge."},{"q":"What does DNS do?","a":"Resolves human-readable names (like google.com) into IP addresses — the internet's phone book."},{"q":"You can reach sites by IP but not by name. What's broken?","a":"DNS — name resolution is failing while basic connectivity works."},{"q":"What does a subnet mask define?","a":"Which part of an IP is the network and which part is the host."},{"q":"What is the default gateway?","a":"The router IP that traffic uses to leave the local network."},{"q":"Ports 80 and 443 are for what, and how do they differ?","a":"Web traffic — 80 is HTTP (unencrypted), 443 is HTTPS (encrypted)."},{"q":"What runs on port 22?","a":"SSH — secure encrypted remote shell access."},{"q":"What port does RDP use?","a":"3389 — Remote Desktop Protocol."},{"q":"What port does DNS use?","a":"53."},{"q":"IMAP vs POP3 — key difference?","a":"IMAP keeps mail on the server and syncs across devices; POP3 downloads to one device and removes it from the server by default."},{"q":"Which email protocol suits a user with phone, laptop, and desktop?","a":"IMAP — it syncs the same mailbox across all devices."},{"q":"What port is SMB (Windows file sharing)?","a":"445."},{"q":"What ports does DHCP use?","a":"67 and 68."},{"q":"Why prefer HTTPS over HTTP?","a":"HTTPS (443) encrypts traffic, protecting it from eavesdropping and tampering."}]},{"id":7,"core":1,"title":"Supporting Network Services","short":"Network Services","blurb":"The server roles behind a business network, the appliances that protect and scale it, and a repeatable way to troubleshoot connectivity — plus why each service exists in the first place.","sections":[{"h":"7.1 Server Roles — the services hosts provide","blocks":[{"t":"p","text":"A 'server' is just a computer dedicated to a service other devices rely on. Networks are built by stacking these roles. Knowing what each one provides explains what breaks when it's down."},{"t":"list","items":[{"l":"DHCP server","s":["Hands out IP addresses automatically"]},{"l":"DNS server","s":["Resolves names to IPs"]},{"l":"File server","s":["Central shared storage"]},{"l":"Print server","s":["Shares printers on the network"]},{"l":"Web server","s":["Serves websites (HTTP/HTTPS)"]},{"l":"Mail server","s":["Handles email (SMTP/IMAP/POP)"]},{"l":"Authentication server","s":["Verifies identities (e.g., Active Directory/AAA)"]},{"l":"Syslog server","s":["Central log collection"]}]},{"t":"note","text":"How this connects: when DNS dies, names stop resolving network-wide; when DHCP dies, new devices can't get addresses (APIPA appears); when the auth server is down, nobody can log in. Each role is a single point that, if it fails, takes a whole capability with it — which is why these are monitored and often made redundant."}]},{"h":"7.2 Appliances That Protect & Scale","blocks":[{"t":"list","items":[{"l":"Firewall","s":["Filters traffic by rules","First line of network defense"]},{"l":"Proxy server","s":["Sits between users and the internet","Caching, filtering, anonymity"]},{"l":"IDS / IPS","s":["IDS detects and alerts","IPS detects and blocks"]},{"l":"Load balancer","s":["Spreads traffic across servers","Improves availability/performance"]},{"l":"UTM","s":["Unified Threat Management — many security functions in one box"]},{"l":"SDN","s":["Software-Defined Networking — central programmable control"]}]},{"t":"note","text":"The big picture: these appliances exist to manage two pressures — security (keep bad traffic out) and scale (handle more traffic gracefully). A firewall controls who gets in; a load balancer ensures one popular service doesn't collapse under load; IDS/IPS watch for attacks the firewall's simple rules miss."},{"t":"tip","k":"focus","text":"IDS = detect and alert (passive). IPS = detect and block (active). The 'P' is for Prevention."},{"t":"sub","text":"Embedded & IoT"},{"t":"list","items":["IoT devices (thermostats, cameras, sensors) are network hosts too","They're often weakly secured — segment them off the main network","Legacy/embedded systems may need isolation"]}]},{"h":"7.3 Troubleshooting Connectivity","blocks":[{"t":"p","text":"Network problems get fast when you test along the path: is the link up, do I have an IP, can I reach the gateway, can I resolve names, can I reach the internet? Each command checks one link in that chain."},{"t":"table","head":["Command","Checks"],"rows":[["ipconfig /all","Your IP, gateway, DNS settings"],["ping","Basic reachability to a host"],["ping 8.8.8.8 vs ping google.com","Separates connectivity from DNS"],["tracert","The path/hops to a destination"],["nslookup","DNS resolution directly"],["ipconfig /flushdns","Clears a stale DNS cache"]]},{"t":"note","text":"The classic split test: if 'ping 8.8.8.8' works but 'ping google.com' fails, the internet is fine and DNS is the culprit. This single test instantly tells you whether to look at connectivity or name resolution."},{"t":"tip","k":"tip","text":"Got APIPA (169.254)? Check the cable/Wi-Fi link and the DHCP server before anything fancy."}]}],"takeaways":["Server roles each own a capability: DHCP=addresses, DNS=names, auth=logins","Firewall controls access; load balancer spreads load; IDS detects, IPS blocks","Segment weakly-secured IoT/embedded devices off the main network","Troubleshoot along the path: link → IP → gateway → DNS → internet","ping 8.8.8.8 working but name failing = DNS problem"],"cards":[{"q":"What does a DHCP server provide?","a":"Automatic IP addresses (plus subnet, gateway, DNS) to devices on the network."},{"q":"What happens network-wide if the DNS server fails?","a":"Names stop resolving — users can't reach sites/resources by name even if connectivity is fine."},{"q":"What does an authentication server (e.g., Active Directory) do?","a":"Verifies user identities and controls access; if it's down, users can't log in."},{"q":"What is a syslog server for?","a":"Centralized collection of logs from many devices for monitoring and auditing."},{"q":"What is a firewall's job?","a":"Filter network traffic by rules — the first line of network defense controlling what's allowed in/out."},{"q":"What does a proxy server do?","a":"Sits between users and the internet to cache, filter content, and provide anonymity/control."},{"q":"IDS vs IPS?","a":"IDS detects and alerts (passive); IPS detects and blocks (active prevention)."},{"q":"What does a load balancer do and why?","a":"Distributes traffic across multiple servers to improve availability and performance under load."},{"q":"What is UTM?","a":"Unified Threat Management — multiple security functions (firewall, IDS/IPS, filtering) combined in one appliance."},{"q":"What is SDN?","a":"Software-Defined Networking — centralized, programmable control of network behavior, separate from the hardware."},{"q":"Why segment IoT devices onto a separate network?","a":"They're often weakly secured; isolation limits the damage if one is compromised."},{"q":"Which command shows your IP, gateway, and DNS settings?","a":"ipconfig /all (Windows)."},{"q":"What does ping test?","a":"Basic reachability — whether a host responds across the network."},{"q":"You can ping 8.8.8.8 but not google.com. What's wrong?","a":"DNS — connectivity works, but name resolution is failing."},{"q":"What does tracert show?","a":"The route (hops) packets take to a destination, helping locate where the path breaks."},{"q":"What does nslookup do?","a":"Queries DNS directly to test/resolve a name to an IP."},{"q":"When would you run ipconfig /flushdns?","a":"To clear a stale or poisoned DNS cache causing wrong/old resolutions."},{"q":"A new device shows a 169.254 address. First checks?","a":"The physical/Wi-Fi link and the DHCP server — it failed to get an address."},{"q":"What is the troubleshooting 'path' order for connectivity?","a":"Link up → have an IP → reach the gateway → resolve DNS → reach the internet."},{"q":"Why are core server roles often made redundant?","a":"Each is a single point of failure for a whole capability; redundancy prevents one outage from taking down logins, names, or addressing."},{"q":"What does a print server centralize?","a":"Shared access to printers, so many users can print without direct connections."}]},{"id":8,"core":1,"title":"Summarizing Virtualization & Cloud Concepts","short":"Virtualization & Cloud","blurb":"Short but high-yield: hypervisor types, why virtualization is so useful, and the cloud service and deployment models you must know cold — plus the idea tying them together (sharing physical resources flexibly).","sections":[{"h":"8.1 Client-Side Virtualization","blocks":[{"t":"p","text":"Virtualization lets one physical machine run many isolated 'virtual' computers. The software that creates and manages them is the hypervisor. This single idea underpins modern IT — from test labs on a laptop to the entire cloud."},{"t":"sub","text":"Hypervisor types"},{"t":"list","items":[{"l":"Type 1 (bare-metal)","s":["Runs directly on hardware","Fast, used in data centers (ESXi, Hyper-V)"]},{"l":"Type 2 (hosted)","s":["Runs on top of an OS","Used on desktops (VirtualBox, VMware Workstation)"]}]},{"t":"note","text":"Why two types: Type 1 sits closest to the hardware for maximum performance and density (servers), while Type 2 is convenient for running a VM alongside your normal desktop. Same concept, different priorities — raw performance vs convenience."},{"t":"sub","text":"Why virtualize"},{"t":"list","items":["Consolidate many servers onto fewer machines (save power/space)","Isolate/sandbox risky software safely","Test multiple OSes without extra hardware","Snapshots let you roll back instantly"]},{"t":"sub","text":"Requirements"},{"t":"list","items":["CPU virtualization support (Intel VT-x / AMD-V)","Enough RAM and CPU cores to share","Adequate storage for VM disks"]},{"t":"tip","k":"focus","text":"Type 1 = bare-metal (on hardware). Type 2 = hosted (on an OS). This pairing is a guaranteed exam item."}]},{"h":"8.2 Cloud Concepts","blocks":[{"t":"p","text":"The cloud is virtualization at massive scale, rented over the internet. The exam tests two ax
